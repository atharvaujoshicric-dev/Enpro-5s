<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enpro Training Management</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
<style>
:root{
  --red:#C8102E;--red-dark:#9B0C22;--red-light:#FDEAED;
  --white:#FFFFFF;--black:#111111;
  --g50:#F9F9F9;--g100:#F2F2F2;--g200:#E5E5E5;--g400:#9E9E9E;--g600:#5C5C5C;
  --ok:#1A7F4B;--ok-bg:#E6F4ED;--warn:#B45309;--warn-bg:#FEF3C7;
  --err:#C8102E;--err-bg:#FDEAED;--info:#1D4ED8;--info-bg:#EFF6FF;
  --bg:var(--white);--bg-surf:var(--g50);--bg-card:var(--white);
  --border:var(--g200);--txt:var(--black);--txt-m:var(--g600);
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --r:10px;--r-sm:6px;--font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
[data-theme=dark]{
  --bg:#0F0F0F;--bg-surf:#1A1A1A;--bg-card:#1F1F1F;--border:#2E2E2E;
  --txt:#F0F0F0;--txt-m:#888;--red-light:#2A0A10;
  --shadow:0 1px 4px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;transition:background .2s,color .2s}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:var(--font)}

/* LAYOUT */
#sidebar{width:240px;min-height:100vh;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;transition:transform .25s}
#sb-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;border-radius:8px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0}
.logo-text{font-size:13px;font-weight:700;line-height:1.3}
.logo-text span{display:block;color:var(--txt-m);font-weight:400;font-size:11px}
#sb-nav{flex:1;overflow-y:auto;padding:12px 0}
.nav-sec{padding:4px 12px 2px;font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--txt-m);text-transform:uppercase;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13.5px;color:var(--txt);border-radius:var(--r-sm);margin:1px 8px;cursor:pointer;transition:background .15s,color .15s}
.nav-item:hover{background:var(--g100)}
[data-theme=dark] .nav-item:hover{background:#2a2a2a}
.nav-item.active{background:var(--red-light);color:var(--red);font-weight:600}
[data-theme=dark] .nav-item.active{background:#2A0A10}
.nav-icon{width:18px;text-align:center;flex-shrink:0}
#sb-foot{padding:12px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);background:var(--bg-surf)}
.u-av{width:32px;height:32px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.u-info{flex:1;min-width:0}
.u-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-role{font-size:11px;color:var(--txt-m)}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
#overlay.show{display:block}
#main{flex:1;margin-left:240px;min-height:100vh;display:flex;flex-direction:column}
@media(max-width:768px){#main{margin-left:0}#sidebar{transform:translateX(-100%)}#sidebar.open{transform:translateX(0)}#menu-toggle{display:block!important}}
#topbar{height:56px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100}
#menu-toggle{display:none;background:none;padding:6px;color:var(--txt);font-size:20px}
#topbar-title{font-size:15px;font-weight:700;flex:1}
#theme-btn{width:34px;height:34px;border-radius:var(--r-sm);background:var(--bg-surf);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
#logout-btn{padding:6px 14px;border-radius:var(--r-sm);background:var(--red-light);color:var(--red);font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:background .15s}
#logout-btn:hover{background:var(--red);color:#fff}
#pg{flex:1;padding:24px;max-width:1100px;width:100%}
@media(max-width:480px){#pg{padding:16px}}

/* LOGIN */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px}
#pw-page{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--bg);padding:16px}
#app-shell{display:none;min-height:100vh}
.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.login-logo{text-align:center;margin-bottom:28px}
.login-lm{width:56px;height:56px;border-radius:14px;background:var(--red);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:22px;margin-bottom:10px}
.login-logo h1{font-size:20px;font-weight:800}
.login-logo p{font-size:12.5px;color:var(--txt-m)}

/* COMPONENTS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-title{font-size:14px;font-weight:700}
.card-body{padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-sm)}
.stat-lbl{font-size:11.5px;color:var(--txt-m);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.stat-val{font-size:28px;font-weight:800;color:var(--red);line-height:1}
.stat-sub{font-size:12px;color:var(--txt-m);margin-top:4px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px}
.form-ctrl{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--txt);font-size:14px;transition:border-color .15s}
.form-ctrl:focus{outline:none;border-color:var(--red)}
.form-ctrl::placeholder{color:var(--g400)}
.form-hint{font-size:11.5px;color:var(--txt-m);margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r-sm);font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap}
.btn-sm{padding:6px 12px;font-size:12.5px}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-dark)}
.btn-secondary{background:var(--bg-surf);color:var(--txt);border-color:var(--border)}
.btn-secondary:hover{background:var(--g200)}
.btn-danger{background:var(--err-bg);color:var(--err)}
.btn-danger:hover{background:var(--err);color:#fff}
.btn-success{background:var(--ok-bg);color:var(--ok)}
.btn-success:hover{background:var(--ok);color:#fff}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.bp{background:var(--warn-bg);color:var(--warn)}
.bs{background:var(--info-bg);color:var(--info)}
.ba{background:var(--ok-bg);color:var(--ok)}
.br{background:var(--err-bg);color:var(--err)}
.bact{background:var(--ok-bg);color:var(--ok)}
.binact{background:var(--g100);color:var(--g600)}
.bpwr{background:var(--warn-bg);color:var(--warn)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{padding:10px 14px;text-align:left;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--txt-m);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-surf)}
.alert{padding:11px 14px;border-radius:var(--r-sm);font-size:13px;margin-bottom:14px}
.alert-error{background:var(--err-bg);color:var(--err);border:1px solid #f5c6cb}
.alert-success{background:var(--ok-bg);color:var(--ok);border:1px solid #b7dfc9}
.alert-info{background:var(--info-bg);color:var(--info);border:1px solid #bfdbfe}
.alert-warn{background:var(--warn-bg);color:var(--warn);border:1px solid #fde68a}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg-card);border-radius:var(--r);box-shadow:var(--shadow);width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;font-size:20px;color:var(--txt-m);padding:2px 6px;border-radius:4px}
.modal-close:hover{background:var(--bg-surf)}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.ci-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.ci-row:last-child{border-bottom:none}
.ci-row input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:var(--red);flex-shrink:0}
.ci-label{flex:1;font-size:14px}
.ph-prev{width:80px;height:80px;object-fit:cover;border-radius:var(--r-sm);border:1px solid var(--border)}
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:800}
.page-sub{font-size:13px;color:var(--txt-m);margin-top:2px}
.empty{text-align:center;padding:48px 24px;color:var(--txt-m)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:6px}
.empty-txt{font-size:13px}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{padding:9px 16px;font-size:13.5px;font-weight:600;background:none;color:var(--txt-m);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.perm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.perm-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r-sm)}
.perm-item input[type=checkbox]{accent-color:var(--red);width:16px;height:16px;flex-shrink:0}
.perm-item label{font-size:13px;cursor:pointer}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
#cfg-banner{background:var(--warn-bg);border-bottom:1px solid #fde68a;padding:10px 20px;font-size:13px;color:var(--warn);text-align:center;display:none}
</style>
</head>
<body>

<div id="cfg-banner">⚠️ Set <strong>SUPABASE_URL</strong> and <strong>SUPABASE_ANON_KEY</strong> in the script config below before deploying.</div>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-lm">E</div>
      <h1>Enpro Industries</h1>
      <p>Training Management System</p>
    </div>
    <div id="login-alert"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-ctrl" type="email" id="li-email" placeholder="admin@enpro.com" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-ctrl" type="password" id="li-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary btn-full" id="li-btn" onclick="doLogin()">Sign In</button>
    <div style="margin-top:14px;text-align:center">
      <button class="btn btn-secondary btn-sm" onclick="toggleTheme()">🌓 Toggle theme</button>
    </div>
  </div>
</div>

<!-- FORCE PASSWORD CHANGE -->
<div id="pw-page" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-lm">E</div>
      <h1>Set New Password</h1>
      <p>Change your temporary password to continue.</p>
    </div>
    <div id="pw-alert"></div>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input class="form-ctrl" type="password" id="pw-new" placeholder="Min 8 characters"/>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input class="form-ctrl" type="password" id="pw-confirm" placeholder="Repeat password"/>
    </div>
    <button class="btn btn-primary btn-full" onclick="doPasswordChange()">Save &amp; Continue</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-shell" style="display:none">
  <div id="overlay" onclick="closeSB()"></div>
  <div id="sidebar">
    <div id="sb-logo">
      <div class="logo-mark">E</div>
      <div class="logo-text">Enpro Industries<span>Training System</span></div>
    </div>
    <nav id="sb-nav"></nav>
    <div id="sb-foot">
      <div class="user-chip">
        <div class="u-av" id="u-av">?</div>
        <div class="u-info">
          <div class="u-name" id="u-name">—</div>
          <div class="u-role" id="u-role">—</div>
        </div>
      </div>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <button id="menu-toggle" onclick="toggleSB()">☰</button>
      <div id="topbar-title">Dashboard</div>
      <button id="theme-btn" onclick="toggleTheme()">🌓</button>
      <button id="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
    <div id="pg"></div>
  </div>
</div>

<div id="modal-wrap"></div>

<script>
// ─────────────────────────────────────────────
// CONFIG — fill these in before deploying
// ─────────────────────────────────────────────
const CFG = {
  url: 'https://xnppjwzikoouscqlzlxc.supabase.co',       // e.g. https://xxxx.supabase.co
  key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhucHBqd3ppa29vdXNjcWx6bHhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MjI0MDMsImV4cCI6MjA5ODI5ODQwM30.fgmTrSy9GhEYzXTzUc18PbpNMtT-huxPdTN6YYxTa78'   // anon/public key from Project Settings → API
};

// ─────────────────────────────────────────────
// BCRYPT — cdnjs build exposes dcodeIO.bcrypt
// ─────────────────────────────────────────────
const BC = window.dcodeIO ? window.dcodeIO.bcrypt : window.bcrypt;

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let ME = null;   // current app_user row
let PERMS = {};  // current user_permissions row

// ─────────────────────────────────────────────
// RAW REST HELPER  — no Supabase JS client used
// All queries go through this function.
// ─────────────────────────────────────────────
async function q(path, opts = {}) {
  if (!CFG.url || CFG.url === 'YOUR_SUPABASE_URL') throw new Error('Supabase not configured.');
  const base = CFG.url.replace(/\/$/, '') + '/rest/v1/';
  const res = await fetch(base + path, {
    method: opts.method || 'GET',
    headers: {
      'apikey': CFG.key,
      'Authorization': 'Bearer ' + CFG.key,
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      'Prefer': opts.prefer || (opts.method === 'POST' ? 'return=representation' : 'return=representation'),
      ...(opts.headers || {})
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const text = await res.text();
  let data;
  try { data = text ? JSON.parse(text) : null; } catch { data = { message: text }; }
  if (!res.ok) {
    const msg = (data && (data.message || data.error || data.hint)) || ('HTTP ' + res.status);
    throw new Error(msg);
  }
  return data;
}

// Convenience wrappers
const db = {
  get:    (table, qs)     => q(table + (qs ? '?' + qs : '')),
  post:   (table, body)   => q(table, { method:'POST',  body }),
  patch:  (table, qs, body) => q(table + '?' + qs, { method:'PATCH', prefer:'return=minimal', body }),
  del:    (table, qs)     => q(table + '?' + qs, { method:'DELETE', prefer:'return=minimal' }),
  count:  (table, qs)     => fetch(
    CFG.url.replace(/\/$/, '') + '/rest/v1/' + table + (qs ? '?' + qs : ''),
    { headers:{ apikey:CFG.key, Authorization:'Bearer '+CFG.key, Accept:'application/json', Prefer:'count=exact', 'Range-Unit':'items', Range:'0-0' } }
  ).then(r => parseInt(r.headers.get('Content-Range')?.split('/')[1] || '0'))
};

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Check config
  if (CFG.url === 'YOUR_SUPABASE_URL' || CFG.key === 'YOUR_SUPABASE_ANON_KEY') {
    document.getElementById('cfg-banner').style.display = 'block';
  }
  // Theme
  document.documentElement.setAttribute('data-theme', localStorage.getItem('enpro_theme') || 'light');
  // Restore session
  try {
    const s = sessionStorage.getItem('enpro_session');
    if (s) { const d = JSON.parse(s); ME = d.me; PERMS = d.perms; showApp(); return; }
  } catch {}
  showPage('login-page');
});

// ─────────────────────────────────────────────
// PAGE SHOW/HIDE
// ─────────────────────────────────────────────
function showPage(id) {
  ['login-page','pw-page','app-shell'].forEach(p => {
    const el = document.getElementById(p);
    el.style.display = 'none';
    el.style.flexDirection = '';
  });
  const target = document.getElementById(id);
  target.style.display = 'flex';
  if (id !== 'app-shell') target.style.flexDirection = 'column';
}

// ─────────────────────────────────────────────
// THEME
// ─────────────────────────────────────────────
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('enpro_theme', t);
}

// ─────────────────────────────────────────────
// AUTH — LOGIN
// ─────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById('li-email').value.trim().toLowerCase();
  const password = document.getElementById('li-pass').value;
  if (!email || !password) { alert2('login-alert', 'Enter email and password.', 'error'); return; }

  const btn = document.getElementById('li-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';

  try {
    // Fetch user row + permissions in one call using PostgREST embedding
    const rows = await db.get('app_users', 'email=eq.' + encodeURIComponent(email) + '&select=*,user_permissions(*)&limit=1');

    if (!rows || rows.length === 0) {
      alert2('login-alert', 'Incorrect email or password.', 'error'); return;
    }
    const user = rows[0];

    if (user.status === 'inactive') {
      alert2('login-alert', 'This account is inactive. Contact your admin.', 'error'); return;
    }

    // Verify password with bcrypt
    const ok = await BC.compare(password, user.password_hash);
    if (!ok) { alert2('login-alert', 'Incorrect email or password.', 'error'); return; }

    // Log login (best-effort)
    db.post('audit_log', { actor_id: user.id, action: 'login', target_type: 'user', target_id: user.id }).catch(() => {});

    ME    = user;
    PERMS = (user.user_permissions && user.user_permissions[0]) || {};

    if (user.status === 'password_reset_required') {
      sessionStorage.setItem('enpro_pending', JSON.stringify({ me: ME, perms: PERMS }));
      showPage('pw-page');
      return;
    }

    sessionStorage.setItem('enpro_session', JSON.stringify({ me: ME, perms: PERMS }));
    showApp();

  } catch (e) {
    alert2('login-alert', 'Login failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

// ─────────────────────────────────────────────
// AUTH — FORCED PASSWORD CHANGE
// ─────────────────────────────────────────────
async function doPasswordChange() {
  const np = document.getElementById('pw-new').value;
  const cp = document.getElementById('pw-confirm').value;
  if (np.length < 8) { alert2('pw-alert', 'Password must be at least 8 characters.', 'error'); return; }
  if (np !== cp)      { alert2('pw-alert', 'Passwords do not match.', 'error'); return; }

  try {
    const pending = JSON.parse(sessionStorage.getItem('enpro_pending'));
    const hash = await BC.hash(np, 10);
    await db.patch('app_users', 'id=eq.' + pending.me.id, { password_hash: hash, status: 'active' });
    db.post('audit_log', { actor_id: pending.me.id, action: 'password_changed', target_type: 'user', target_id: pending.me.id }).catch(() => {});

    pending.me.status = 'active';
    sessionStorage.removeItem('enpro_pending');
    sessionStorage.setItem('enpro_session', JSON.stringify(pending));
    ME = pending.me; PERMS = pending.perms;
    showApp();
  } catch (e) {
    alert2('pw-alert', 'Failed to save password: ' + e.message, 'error');
  }
}

// ── OPEN ASSIGNMENT ────────────────────────
async function openAssign(id) {
  try {
    const asgn = (await db.get('training_assignments', 'id=eq.' + id + '&select=*,trainings(title,description,training_checklist_items(*))&limit=1'))[0];
    if (!asgn) { toast('Assignment not found.', 'error'); return; }
    const items = (asgn.trainings?.training_checklist_items || []).sort((a,b)=>a.order_index-b.order_index);
    const resps = await db.get('assignment_checklist_responses', 'assignment_id=eq.' + id + '&select=*');
    const rmap  = {}; resps.forEach(r => rmap[r.checklist_item_id] = r);

    const canEdit    = asgn.assigned_to === ME.id && ['pending','rejected'].includes(asgn.status);
    const canApprove = PERMS.can_approve_completions && asgn.status === 'submitted';

    const ciHtml = items.map(item => {
      const r = rmap[item.id] || {};
      return `<div class="ci-row">
        <input type="checkbox" id="chk-${item.id}" ${r.is_checked?'checked':''} ${canEdit?'':'disabled'} onchange="saveCi('${id}','${item.id}')"/>
        <div class="ci-label">
          <div>${esc(item.description)}${item.requires_photo?'<span style="color:var(--red);margin-left:4px">*photo</span>':''}</div>
          ${r.photo_url?`<img src="${r.photo_url}" class="ph-prev" style="margin-top:6px"/>`:''}
          ${canEdit && item.requires_photo ? `<div style="margin-top:6px">
            <input type="file" accept="image/*" capture="environment" id="ph-${item.id}" style="display:none" onchange="uploadPh('${id}','${item.id}')"/>
            <button class="btn btn-sm btn-secondary" onclick="document.getElementById('ph-${item.id}').click()">📷 ${r.photo_url?'Change photo':'Attach photo'}</button>
          </div>` : ''}
          ${canEdit?`<textarea class="form-ctrl" style="margin-top:6px;font-size:12px" rows="1" placeholder="Notes (optional)" id="note-${item.id}" onblur="saveCi('${id}','${item.id}')">${r.notes||''}</textarea>`:(r.notes?`<div style="font-size:12px;color:var(--txt-m);margin-top:4px">${esc(r.notes)}</div>`:'')}
        </div>
      </div>`;
    }).join('');

    modal(
      'Training: ' + esc(asgn.trainings?.title),
      `<div style="margin-bottom:12px">${bdg(asgn.status)}</div>
       ${asgn.trainings?.description?`<p style="font-size:13px;color:var(--txt-m);margin-bottom:16px">${esc(asgn.trainings.description)}</p>`:''}
       ${items.length ? ciHtml : '<p style="color:var(--txt-m)">No checklist items.</p>'}
       ${canEdit?`<div style="margin-top:20px"><button class="btn btn-primary" onclick="submitAsgn('${id}')">Submit for Approval</button></div>`:''}
       ${canApprove?`<div style="margin-top:16px">
         <div class="form-group"><label class="form-label">Remarks (optional)</label>
           <textarea class="form-ctrl" id="apr-remarks" rows="2" placeholder="Add remarks..."></textarea></div>
         <div style="display:flex;gap:10px">
           <button class="btn btn-success" onclick="approveAsgn('${id}')">✅ Approve</button>
           <button class="btn btn-danger" onclick="rejectAsgn('${id}')">❌ Reject</button>
         </div></div>`:''}
       ${asgn.approver_remarks?`<div class="alert alert-info" style="margin-top:12px"><strong>Approver remarks:</strong> ${esc(asgn.approver_remarks)}</div>`:''}`
    );
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function saveCi(asgnId, itemId) {
  const isChecked = document.getElementById('chk-' + itemId)?.checked || false;
  const notes     = document.getElementById('note-' + itemId)?.value || null;
  // upsert via POST with Prefer: resolution=merge-duplicates
  await fetch(CFG.url.replace(/\/$/,'') + '/rest/v1/assignment_checklist_responses', {
    method: 'POST',
    headers: { apikey: CFG.key, Authorization: 'Bearer ' + CFG.key, 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ assignment_id: asgnId, checklist_item_id: itemId, is_checked: isChecked, notes, updated_at: new Date().toISOString() })
  });
}

async function uploadPh(asgnId, itemId) {
  const file = document.getElementById('ph-' + itemId).files[0];
  if (!file) return;
  const path = asgnId + '/' + itemId + '.' + file.name.split('.').pop();
  const upRes = await fetch(CFG.url.replace(/\/$/,'') + '/storage/v1/object/training-photos/' + path, {
    method: 'POST', headers: { apikey: CFG.key, Authorization: 'Bearer ' + CFG.key, 'x-upsert': 'true' }, body: file
  });
  if (!upRes.ok) { toast('Photo upload failed.', 'error'); return; }
  const photoUrl = CFG.url.replace(/\/$/,'') + '/storage/v1/object/public/training-photos/' + path;
  await fetch(CFG.url.replace(/\/$/,'') + '/rest/v1/assignment_checklist_responses', {
    method: 'POST',
    headers: { apikey: CFG.key, Authorization: 'Bearer ' + CFG.key, 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ assignment_id: asgnId, checklist_item_id: itemId, photo_url: photoUrl, updated_at: new Date().toISOString() })
  });
  toast('Photo uploaded!');
}

async function submitAsgn(id) {
  await db.patch('training_assignments', 'id=eq.' + id, { status: 'submitted', submitted_at: new Date().toISOString() });
  db.post('audit_log', { actor_id: ME.id, action: 'assignment_submitted', target_type: 'assignment', target_id: id }).catch(()=>{});
  closeModal(); toast('Submitted for approval!'); PAGES['my-trainings']();
}

async function approveAsgn(id) {
  const remarks = document.getElementById('apr-remarks')?.value || '';
  await db.patch('training_assignments', 'id=eq.' + id, { status: 'approved', approved_at: new Date().toISOString(), approved_by: ME.id, approver_remarks: remarks });
  db.post('audit_log', { actor_id: ME.id, action: 'assignment_approved', target_type: 'assignment', target_id: id }).catch(()=>{});
  closeModal(); toast('Training approved!'); PAGES.approvals();
}

async function rejectAsgn(id) {
  const remarks = document.getElementById('apr-remarks')?.value || '';
  if (!remarks) { toast('Add a remark before rejecting.', 'error'); return; }
  await db.patch('training_assignments', 'id=eq.' + id, { status: 'rejected', approver_remarks: remarks });
  db.post('audit_log', { actor_id: ME.id, action: 'assignment_rejected', target_type: 'assignment', target_id: id }).catch(()=>{});
  closeModal(); toast('Rejected.'); PAGES.approvals();
}

let _cic = 1000;
function _ciRow(id, desc, reqPhoto) {
  const uid = id || 'n' + (_cic++);
  return `<div class="ci-row" id="cir-${uid}" style="align-items:center">
    <input class="form-ctrl" style="flex:1;margin-right:8px" value="${esc(desc||'')}" id="cd-${uid}" placeholder="Item description"/>
    <label style="font-size:12px;white-space:nowrap;display:flex;align-items:center;gap:4px;margin-right:8px">
      <input type="checkbox" ${reqPhoto?'checked':''} id="cp-${uid}"/> Photo
    </label>
    <button class="btn btn-sm btn-danger" onclick="document.getElementById('cir-${uid}').remove()">✕</button>
  </div>`;
}
window.addCiRow = () => document.getElementById('ci-editor').insertAdjacentHTML('beforeend', _ciRow(null,'',false));

function _openTrnModal(t) {
  const items = (t?.training_checklist_items||[]).sort((a,b)=>a.order_index-b.order_index);
  modal(t ? 'Edit Training' : 'New Training', `
    <div class="form-group"><label class="form-label">Title *</label><input class="form-ctrl" id="t-title" value="${esc(t?.title||'')}"/></div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-ctrl" id="t-desc" rows="2">${esc(t?.description||'')}</textarea></div>
    <div style="font-weight:700;font-size:13px;margin-bottom:10px">Checklist Items</div>
    <div id="ci-editor">${items.map(i=>_ciRow(i.id,i.description,i.requires_photo)).join('')}</div>
    <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="addCiRow()">+ Add Item</button>
    <div id="t-alert" style="margin-top:12px"></div>`,
    [{ label: t ? 'Save Changes':'Create Training', cls:'btn-primary', fn: async () => {
      const title = document.getElementById('t-title').value.trim();
      if (!title) { alert2('t-alert','Title required.','error'); return; }
      const desc = document.getElementById('t-desc').value.trim() || null;
      let tid = t?.id;
      if (tid) {
        await db.patch('trainings','id=eq.'+tid,{title,description:desc});
        await db.del('training_checklist_items','training_id=eq.'+tid);
      } else {
        const rows = await db.post('trainings',{title,description:desc,created_by:ME.id});
        tid = rows[0].id;
      }
      const ciRows = [...document.querySelectorAll('#ci-editor .ci-row')];
      const ciData = ciRows.map((row,i)=>{
        const uid = row.id.replace('cir-','');

async function _openWfModal(w) {
  const [allTrn, allUsr] = await Promise.all([
    db.get('trainings','select=id,title&order=title'),
    db.get('app_users','status=eq.active&select=id,name&order=name')
  ]);
  const selTrn = (w?.workflow_trainings||[]).map(x=>x.training_id);
  const selUsr = (w?.workflow_managers||[]).map(x=>x.user_id);
  modal(w?'Edit Workflow':'New Workflow', `
    <div class="form-group"><label class="form-label">Title *</label><input class="form-ctrl" id="w-title" value="${esc(w?.title||'')}"/></div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-ctrl" id="w-desc" rows="2">${esc(w?.description||'')}</textarea></div>
    <div class="form-group"><label class="form-label">Type</label>
      <select class="form-ctrl" id="w-type">
        <option value="sequential" ${w?.type==='sequential'?'selected':''}>Sequential (must complete in order)</option>
        <option value="flexible"   ${w?.type==='flexible'  ?'selected':''}>Flexible (any order)</option>
      </select></div>
    <div class="form-group"><label class="form-label">Trainings (Ctrl/Cmd to multi-select)</label>
      <select class="form-ctrl" id="w-trns" multiple style="height:100px">
        ${allTrn.map(t=>`<option value="${t.id}" ${selTrn.includes(t.id)?'selected':''}>${esc(t.title)}</option>`).join('')}
      </select></div>
    <div class="form-group"><label class="form-label">Managers (can manage this workflow)</label>
      <select class="form-ctrl" id="w-mgrs" multiple style="height:80px">
        ${allUsr.map(u=>`<option value="${u.id}" ${selUsr.includes(u.id)?'selected':''}>${esc(u.name)}</option>`).join('')}
      </select></div>
    <div id="w-alert"></div>`,
    [{ label:w?'Save Changes':'Create Workflow', cls:'btn-primary', fn:async()=>{
      const title = document.getElementById('w-title').value.trim();
      if (!title) { alert2('w-alert','Title required.','error'); return; }
      const desc  = document.getElementById('w-desc').value.trim() || null;
      const type  = document.getElementById('w-type').value;
      const trnIds = [...document.getElementById('w-trns').selectedOptions].map(o=>o.value);
      const mgrIds = [...document.getElementById('w-mgrs').selectedOptions].map(o=>o.value);
      let wid = w?.id;
      if (wid) {
        await db.patch('workflows','id=eq.'+wid,{title,description:desc,type});
        await db.del('workflow_trainings','workflow_id=eq.'+wid);
        await db.del('workflow_managers','workflow_id=eq.'+wid);
      } else {
        const rows = await db.post('workflows',{title,description:desc,type,created_by:ME.id});
        wid = rows[0].id;
      }
      if (trnIds.length) await db.post('workflow_trainings', trnIds.map((tid,i)=>({workflow_id:wid,training_id:tid,order_index:i})));
      if (mgrIds.length) await db.post('workflow_managers',  mgrIds.map(uid=>({workflow_id:wid,user_id:uid})));
      closeModal(); toast(w?'Workflow updated!':'Workflow created!'); PAGES.workflows();
    }}]
  );
}

          closeModal(); toast('Permissions saved!');

      );

};

  const [allUsers, depts] = await Promise.all([

    <div class="form-row">

        </select></div>
      <div class="form-group"><label class="form-label">Reports To</label>

      } else {
        const tmpPw = 'Enp' + Math.random().toString(36).slice(2,6).toUpperCase() + (10+Math.floor(Math.random()*90));
        const hash  = await BC.hash(tmpPw, 10);
        const rows  = await db.post('app_users',{name,email,password_hash:hash,status:'password_reset_required',department_id:dept,reports_to:rpt,created_by:ME.id});

        db.post('audit_log',{actor_id:ME.id,action:'user_created',target_type:'user',target_id:newId}).catch(()=>{});

          <div class="alert alert-warn">Share this password with <strong>${esc(name)}</strong>. It will not be shown again.</div>

          [{ label:'Done', cls:'btn-primary', fn:()=>{ closeModal(); PAGES.users(); }}]

      }
    }}]
  );
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function modal(title, body, actions = []) {
  const btns = actions.map(a=>`<button class="btn ${a.cls}" id="ma-${a.label.replace(/\s+/g,'_')}">${a.label}</button>`).join('');
  document.getElementById('modal-wrap').innerHTML = `
    <div class="modal-ov">
      <div class="modal">
        <div class="modal-hd">
          <span class="modal-title">${title}</span>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">${body}</div>
        ${actions.length?`<div class="modal-foot">${btns}<button class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>`:''}
      </div>
    </div>`;
  actions.forEach(a => {
    const btn = document.getElementById('ma-' + a.label.replace(/\s+/g,'_'));
    if (btn) btn.addEventListener('click', a.fn);
  });
}
function closeModal() { document.getElementById('modal-wrap').innerHTML = ''; }

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.15);transition:opacity .3s;background:${type==='success'?'#1A7F4B':type==='error'?'#C8102E':'#1D4ED8'};color:#fff`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

// ─────────────────────────────────────────────
// IN-PAGE ALERT
// ─────────────────────────────────────────────
function alert2(id, msg, type) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function fd(d)  { return d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }
function fdt(d) { return d ? new Date(d).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'; }
function err(e) { return `<div class="alert alert-error">Error: ${esc(e.message)}</div>`; }
function bdg(s) {
  const m = { pending:'bp', submitted:'bs', approved:'ba', rejected:'br', active:'bact', inactive:'binact', password_reset_required:'bpwr' };
  const l = { password_reset_required:'Temp PW' };
  return `<span class="badge ${m[s]||''}">${l[s]||s}</span>`;
}

// Enter key on login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') doLogin();
});
