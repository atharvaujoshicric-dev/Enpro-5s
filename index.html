<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enpro — Training Management</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--red:#C0202A;--red-dark:#96181F;--red-light:#FDECEA;--white:#FFFFFF;--black:#111111;--gray-50:#F8F8F8;--gray-100:#EFEFEF;--gray-200:#DEDEDE;--gray-400:#999;--gray-600:#555;--shadow-sm:0 1px 3px rgba(0,0,0,.10);--shadow:0 3px 12px rgba(0,0,0,.12);--radius:8px;--tr:.18s ease}
[data-theme="dark"]{--white:#1A1A1A;--black:#F0F0F0;--gray-50:#222;--gray-100:#2A2A2A;--gray-200:#363636;--gray-400:#777;--gray-600:#AAA;--shadow-sm:0 1px 3px rgba(0,0,0,.4);--shadow:0 3px 12px rgba(0,0,0,.45)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray-50);color:var(--black);font-size:15px;line-height:1.5}
button{cursor:pointer;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}
a{color:var(--red);text-decoration:none}

/* SETUP / LOGIN */
.center-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--gray-50)}
.auth-card{background:var(--white);border-radius:12px;padding:36px;max-width:420px;width:100%;box-shadow:var(--shadow)}
.brand-row{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.brand-mark{width:40px;height:40px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1.2rem;flex-shrink:0}
.brand-row h2{font-size:1.2rem;font-weight:700;line-height:1.2}
.brand-row span{font-size:.78rem;color:var(--gray-400)}

/* APP SHELL */
#app{display:none;height:100vh;overflow:hidden;flex-direction:column}
.topbar{height:52px;background:var(--red);color:#fff;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100}
.topbar .burger{background:none;border:none;color:#fff;font-size:1.4rem;padding:4px;display:none}
.topbar .brand{font-weight:700;font-size:1rem;flex:1}
.topbar .theme-btn{background:none;border:none;color:#fff;font-size:1.1rem;padding:4px 8px;border-radius:4px}
.topbar .user-chip{background:rgba(255,255,255,.18);border-radius:20px;padding:4px 12px;font-size:.8rem;display:flex;align-items:center;gap:8px}
.signout-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:.8rem;padding:0}
.app-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;background:var(--white);border-right:1px solid var(--gray-200);overflow-y:auto;flex-shrink:0;transition:transform var(--tr)}
.sidebar nav{padding:12px 0}
.nav-section{padding:6px 16px 2px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);margin-top:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:var(--gray-600);cursor:pointer;transition:background var(--tr),color var(--tr);font-size:.88rem}
.nav-item:hover{background:var(--gray-50);color:var(--black)}
.nav-item.active{background:var(--red-light);color:var(--red);font-weight:600}
[data-theme="dark"] .nav-item.active{background:rgba(192,32,42,.15)}
.nav-item .icon{width:18px;text-align:center}
.main{flex:1;overflow-y:auto;padding:24px}
@media(max-width:768px){.topbar .burger{display:block}.sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:200;transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{padding:16px}}

/* FORMS */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.78rem;font-weight:700;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-control{width:100%;padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius);background:var(--white);color:var(--black);outline:none;transition:border-color var(--tr)}
.form-control:focus{border-color:var(--red)}
.form-control:disabled{background:var(--gray-100);color:var(--gray-400)}
textarea.form-control{resize:vertical;min-height:80px}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:.88rem}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--red)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--radius);font-weight:600;font-size:.88rem;border:none;transition:all var(--tr);white-space:nowrap;cursor:pointer}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:var(--red-dark)}
.btn-outline{background:transparent;border:1.5px solid var(--gray-200);color:var(--black)}.btn-outline:hover{border-color:var(--red);color:var(--red)}
.btn-ghost{background:transparent;border:none;color:var(--gray-600);padding:6px 10px}.btn-ghost:hover{color:var(--red)}
.btn-danger{background:#fee2e2;color:#b91c1c;border:none}.btn-danger:hover{background:#fca5a5}
.btn-success{background:#dcfce7;color:#15803d;border:none}.btn-success:hover{background:#bbf7d0}
.btn-sm{padding:5px 12px;font-size:.8rem}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* CARDS */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--gray-100);margin-bottom:16px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-header h2{font-size:1rem;font-weight:700}
.card-body{padding:20px}

/* PAGE HEADER */
.page-header{margin-bottom:20px}
.page-header h1{font-size:1.3rem;font-weight:700}
.page-header p{font-size:.88rem;color:var(--gray-600);margin-top:2px}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{padding:10px 14px;text-align:left;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);border-bottom:2px solid var(--gray-100);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}

/* BADGES */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-green{background:#dcfce7;color:#15803d}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-yellow{background:#fef9c3;color:#a16207}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1rem;font-weight:700}
.modal-close{background:none;border:none;font-size:1.2rem;color:var(--gray-400);cursor:pointer;padding:4px}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:8px}

/* TOAST */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 18px;border-radius:var(--radius);font-size:.85rem;font-weight:600;color:#fff;box-shadow:var(--shadow);pointer-events:all;animation:slideIn .2s ease;max-width:340px}
.toast-success{background:#16a34a}.toast-error{background:var(--red)}.toast-info{background:#2563eb}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-100)}
.stat-card .val{font-size:1.8rem;font-weight:800;color:var(--red);line-height:1}
.stat-card .lbl{font-size:.75rem;color:var(--gray-400);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* CHECKLIST */
.checklist-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-100)}
.checklist-item:last-child{border-bottom:none}
.checklist-item input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:var(--red);flex-shrink:0}
.checklist-item .item-desc{flex:1;font-size:.9rem}
.photo-label{font-size:.75rem;color:var(--red);font-weight:600;margin-top:4px;display:block}
.photo-preview{width:72px;height:72px;border-radius:6px;object-fit:cover;border:2px solid var(--gray-200);cursor:pointer;margin-top:6px;display:block}

/* PERMISSIONS */
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:480px){.perm-grid{grid-template-columns:1fr}}
.perm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:.82rem;cursor:pointer;transition:border-color var(--tr)}
.perm-item:hover{border-color:var(--red)}
.perm-item input{accent-color:var(--red)}

/* MISC */
.divider{border:none;border-top:1px solid var(--gray-100);margin:16px 0}
.text-red{color:var(--red)}
.flex-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-input{padding:7px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius);background:var(--white);color:var(--black);outline:none;font-size:.88rem;min-width:160px;transition:border-color var(--tr)}
.search-input:focus{border-color:var(--red)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;background:var(--gray-100);border-radius:20px;font-size:.78rem;color:var(--gray-600)}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--gray-100);margin-bottom:20px}
.tab{padding:8px 16px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--gray-400);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all var(--tr)}
.tab.active{color:var(--red);border-color:var(--red)}
.empty-state{text-align:center;padding:48px 24px;color:var(--gray-400)}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px}
</style>
</head>
<body>

<div id="toast-container"></div>

<!-- SETUP -->
<div id="setup-screen" class="center-screen">
  <div class="auth-card">
    <div class="brand-row"><div class="brand-mark">E</div><div><h2>Enpro Training</h2><span>Initial Setup</span></div></div>
    <div class="form-group"><label>Supabase Project URL</label>
      <input class="form-control" id="sb-url" placeholder="https://xxxx.supabase.co"/></div>
    <div class="form-group"><label>Supabase Anon Key</label>
      <input class="form-control" id="sb-key" placeholder="eyJhbGci..."/></div>
    <button class="btn btn-primary" style="width:100%" onclick="saveSetup()">Save & Continue</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen" class="center-screen" style="display:none">
  <div class="auth-card">
    <div class="brand-row"><div class="brand-mark">E</div><div><h2>Enpro Industries</h2><span>Training Management System</span></div></div>
    <div class="form-group"><label>Employee ID</label>
      <input class="form-control" id="login-emp" placeholder="e.g. ADMIN-001" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="form-group"><label>Password</label>
      <input class="form-control" type="password" id="login-pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="doLogin()" id="login-btn">Sign In</button>
    <p style="font-size:.78rem;color:var(--gray-400);margin-top:14px;text-align:center">
      <a href="#" onclick="clearSetup()">Change Supabase connection</a></p>
  </div>
</div>

<!-- FORCE PASSWORD CHANGE -->
<div class="modal-overlay" id="pw-change-modal">
  <div class="modal">
    <div class="modal-header"><h3>🔒 Set Your Password</h3></div>
    <div class="modal-body">
      <p style="margin-bottom:16px;font-size:.88rem;color:var(--gray-600)">You must set a new password before continuing.</p>
      <div class="form-group"><label>New Password</label>
        <input class="form-control" type="password" id="new-pw1" placeholder="Min 8 characters"/></div>
      <div class="form-group"><label>Confirm Password</label>
        <input class="form-control" type="password" id="new-pw2" placeholder="Repeat password"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="submitNewPassword()">Update Password</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <button class="burger" onclick="toggleSidebar()">☰</button>
    <div class="brand">Enpro Training</div>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    <div class="user-chip">
      <span>👤</span><span id="topbar-user">—</span>
      <button class="signout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar" id="sidebar"><nav id="sidebar-nav"></nav></div>
    <div class="main" id="main-content"></div>
  </div>
</div>

<!-- GENERIC MODAL -->
<div class="modal-overlay" id="generic-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="gm-title">—</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="gm-body"></div>
    <div class="modal-footer" id="gm-footer"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════
   GLOBALS
═══════════════════════════════ */
let SB = null;
let SESSION = null;

const PERMISSIONS = [
  {key:'manage_users',        label:'Manage Users',        icon:'👥'},
  {key:'manage_departments',  label:'Manage Departments',  icon:'🏢'},
  {key:'manage_trainings',    label:'Manage Trainings',    icon:'📋'},
  {key:'manage_workflows',    label:'Manage Workflows',    icon:'🔄'},
  {key:'assign_trainings',    label:'Assign Trainings',    icon:'📌'},
  {key:'approve_completions', label:'Approve Completions', icon:'✅'},
  {key:'view_reports',        label:'View Reports',        icon:'📊'},
];

const STATUS_BADGE = {
  pending:     '<span class="badge badge-gray">Pending</span>',
  in_progress: '<span class="badge badge-blue">In Progress</span>',
  submitted:   '<span class="badge badge-yellow">Submitted</span>',
  approved:    '<span class="badge badge-green">Approved</span>',
  rejected:    '<span class="badge badge-red">Rejected</span>',
};

/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  const url = localStorage.getItem('sb_url');
  const key = localStorage.getItem('sb_key');
  const theme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelector('.theme-btn') && (document.querySelector('.theme-btn').textContent = theme === 'dark' ? '☀️' : '🌙');
  if (url && key) {
    SB = supabase.createClient(url, key);
    showScreen('login-screen');
  } else {
    showScreen('setup-screen');
  }
});

function showScreen(id) {
  ['setup-screen','login-screen'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'flex' : 'none';
  });
  document.getElementById('app').style.display = id === 'app' ? 'flex' : 'none';
}

/* ═══════════════════════════════
   SETUP
═══════════════════════════════ */
function saveSetup() {
  const url = document.getElementById('sb-url').value.trim();
  const key = document.getElementById('sb-key').value.trim();
  if (!url || !key) return toast('Fill in both fields.', 'error');
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  SB = supabase.createClient(url, key);
  showScreen('login-screen');
  toast('Connection saved!', 'success');
}

function clearSetup() {
  localStorage.removeItem('sb_url');
  localStorage.removeItem('sb_key');
  SB = null;
  showScreen('setup-screen');
}

/* ═══════════════════════════════
   LOGIN
═══════════════════════════════ */
async function doLogin() {
  const empId = document.getElementById('login-emp').value.trim().toUpperCase();
  const pw = document.getElementById('login-pw').value;
  if (!empId || !pw) return toast('Enter Employee ID and password.', 'error');

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    // Step 1: get user row
    const { data: user, error: ue } = await SB
      .from('users')
      .select('id,employee_id,full_name,email,is_admin,is_active,must_change_pw,department_id,reports_to')
      .eq('employee_id', empId)
      .eq('is_active', true)
      .maybeSingle();

    if (ue) { toast('Error: ' + ue.message, 'error'); btn.disabled=false; btn.textContent='Sign In'; return; }
    if (!user) { toast('Employee ID not found.', 'error'); btn.disabled=false; btn.textContent='Sign In'; return; }

    // Step 2: verify password
    const { data: pwOk, error: pe } = await SB.rpc('check_user_password', {
      p_user_id: user.id,
      p_password: pw
    });

    if (pe) { toast('Auth error: ' + pe.message, 'error'); btn.disabled=false; btn.textContent='Sign In'; return; }
    if (!pwOk) { toast('Incorrect password.', 'error'); btn.disabled=false; btn.textContent='Sign In'; return; }

    // Step 3: load session
    await loadSession(user);

  } catch (e) {
    toast('Unexpected error: ' + (e.message || String(e)), 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Sign In';
}

async function loadSession(user) {
  // set RLS session var (best effort)
  try { await SB.rpc('set_app_user', { p_user_id: user.id }); } catch(_) {}

  // load permissions
  const { data: perms } = await SB
    .from('user_permissions')
    .select('permission')
    .eq('user_id', user.id);

  SESSION = { user, permissions: (perms || []).map(p => p.permission) };

  document.getElementById('topbar-user').textContent =
    user.full_name + (user.is_admin ? ' (Admin)' : '');

  if (user.must_change_pw) {
    openPwModal();
    showScreen('app');
    return;
  }

  showScreen('app');
  buildNav();
  renderPage('dashboard');
}

function logout() {
  SESSION = null;
  showScreen('login-screen');
  document.getElementById('login-pw').value = '';
  toast('Signed out.', 'info');
}

/* ═══════════════════════════════
   PASSWORD CHANGE
═══════════════════════════════ */
function openPwModal() {
  document.getElementById('pw-change-modal').classList.add('open');
}

async function submitNewPassword() {
  const p1 = document.getElementById('new-pw1').value;
  const p2 = document.getElementById('new-pw2').value;
  if (p1.length < 8) return toast('Min 8 characters.', 'error');
  if (p1 !== p2) return toast('Passwords do not match.', 'error');
  const { error } = await SB.rpc('update_user_password', { p_user_id: SESSION.user.id, p_new_password: p1 });
  if (error) return toast('Error: ' + error.message, 'error');
  SESSION.user.must_change_pw = false;
  document.getElementById('pw-change-modal').classList.remove('open');
  toast('Password updated!', 'success');
  buildNav();
  renderPage('dashboard');
}

/* ═══════════════════════════════
   NAV
═══════════════════════════════ */
function can(perm) {
  if (!SESSION) return false;
  if (SESSION.user.is_admin) return true;
  return SESSION.permissions.includes(perm);
}

function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  const pages = [
    {id:'dashboard',    label:'Dashboard',    icon:'📊', always:true},
    {id:'my-trainings', label:'My Trainings', icon:'📋', always:true},
    {id:'approvals',    label:'Approvals',    icon:'✅', perm:'approve_completions'},
    {section:'Management'},
    {id:'users',        label:'Users',        icon:'👥', perm:'manage_users'},
    {id:'departments',  label:'Departments',  icon:'🏢', perm:'manage_departments'},
    {id:'trainings',    label:'Trainings',    icon:'📚', perm:'manage_trainings'},
    {id:'workflows',    label:'Workflows',    icon:'🔄', perm:'manage_workflows'},
    {id:'assign',       label:'Assign',       icon:'📌', perm:'assign_trainings'},
    {section:'Admin', admin:true},
    {id:'reports',      label:'Reports',      icon:'📈', perm:'view_reports'},
    {id:'settings',     label:'Settings',     icon:'⚙️', always:true},
  ];
  pages.forEach(p => {
    if (p.section) {
      if (p.admin && !SESSION.user.is_admin) return;
      const el = document.createElement('div');
      el.className = 'nav-section';
      el.textContent = p.section;
      nav.appendChild(el);
      return;
    }
    if (!p.always && p.admin && !SESSION.user.is_admin) return;
    if (p.perm && !can(p.perm)) return;
    const el = document.createElement('div');
    el.className = 'nav-item';
    el.dataset.page = p.id;
    el.innerHTML = `<span class="icon">${p.icon}</span>${p.label}`;
    el.onclick = () => { renderPage(p.id); closeSidebar(); };
    nav.appendChild(el);
  });
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.page === id));
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function closeSidebar()   { document.getElementById('sidebar').classList.remove('open'); }

/* ═══════════════════════════════
   ROUTER
═══════════════════════════════ */
function renderPage(id) {
  setActiveNav(id);
  document.getElementById('main-content').innerHTML =

async function openChecklist(assignmentId) {
  const {data:ta} = await SB.from('training_assignments')
    .select('id,status,trainings(id,title)').eq('id',assignmentId).single();
  const {data:items} = await SB.from('checklist_items')
    .select('id,description,requires_photo,sort_order')
    .eq('training_id',ta.trainings.id).order('sort_order');
  const {data:comps} = await SB.from('checklist_item_completions')
    .select('id,checklist_item_id,is_done,photo_url')
    .eq('training_assignment_id',assignmentId);
  const compMap = {};
  (comps||[]).forEach(c => { compMap[c.checklist_item_id] = c; });
  const editable = ['pending','in_progress','rejected'].includes(ta.status);

  openModal(`Checklist: ${ta.trainings.title}`, `
    <div>
      ${items && items.length > 0 ? items.map(item => {
        const c = compMap[item.id];
        return `<div class="checklist-item">
          <input type="checkbox" id="chk-${item.id}" ${c?.is_done?'checked':''} ${editable?'':'disabled'}
            onchange="toggleCI('${assignmentId}','${item.id}',this.checked)"/>
          <div class="item-desc">
            <div>${item.description}</div>
            ${item.requires_photo ? `<span class="photo-label">📷 Photo required</span>
              ${c?.photo_url ? `<img src="${c.photo_url}" class="photo-preview" onclick="window.open('${c.photo_url}')"/>` : ''}
              ${editable ? `<input type="file" accept="image/*" capture="environment" style="margin-top:6px;font-size:.78rem"
                onchange="uploadPhoto('${assignmentId}','${item.id}',this)"/>` : ''}` : ''}
          </div>
        </div>`;
      }).join('') : '<p style="color:var(--gray-400)">No checklist items for this training.</p>'}
    </div>`,
    editable ? [
      {label:'Submit for Approval', action:()=>submitTraining(assignmentId,ta.trainings.id), style:'btn-primary'},
    ] : []
  );
}

async function toggleCI(assignmentId, itemId, checked) {
  const {data:ex} = await SB.from('checklist_item_completions')
    .select('id').eq('training_assignment_id',assignmentId).eq('checklist_item_id',itemId).maybeSingle();
  if (ex) {
    await SB.from('checklist_item_completions').update({is_done:checked,completed_at:checked?new Date().toISOString():null}).eq('id',ex.id);
  } else {
    await SB.from('checklist_item_completions').insert({training_assignment_id:assignmentId,checklist_item_id:itemId,is_done:checked,completed_at:checked?new Date().toISOString():null});
  }
  await SB.from('training_assignments').update({status:'in_progress'}).eq('id',assignmentId).eq('status','pending');
}

async function uploadPhoto(assignmentId, itemId, input) {
  const file = input.files[0];
  if (!file) return;
  toast('Uploading…','info');
  const ext = file.name.split('.').pop();
  const {error} = await SB.storage.from('training-photos').upload(`${assignmentId}/${itemId}.${ext}`, file, {upsert:true});
  if (error) return toast('Upload failed: '+error.message,'error');
  const {data:u} = SB.storage.from('training-photos').getPublicUrl(`${assignmentId}/${itemId}.${ext}`);
  const {data:ex} = await SB.from('checklist_item_completions')
    .select('id').eq('training_assignment_id',assignmentId).eq('checklist_item_id',itemId).maybeSingle();
  if (ex) { await SB.from('checklist_item_completions').update({photo_url:u.publicUrl}).eq('id',ex.id); }
  else { await SB.from('checklist_item_completions').insert({training_assignment_id:assignmentId,checklist_item_id:itemId,is_done:false,photo_url:u.publicUrl}); }
  toast('Photo uploaded!','success');
}

async function submitTraining(assignmentId, trainingId) {
  // check required photos
  const {data:reqItems} = await SB.from('checklist_items')
    .select('id').eq('training_id',trainingId).eq('requires_photo',true);
  if (reqItems && reqItems.length > 0) {
    const {data:comps} = await SB.from('checklist_item_completions')
      .select('checklist_item_id,photo_url').eq('training_assignment_id',assignmentId)
      .in('checklist_item_id',reqItems.map(i=>i.id));
    const missing = reqItems.some(item => !(comps||[]).find(c=>c.checklist_item_id===item.id)?.photo_url);
    if (missing) return toast('Upload all required photos first.','error');
  }
  const {error} = await SB.from('training_assignments').update({status:'submitted'}).eq('id',assignmentId);
  if (error) return toast('Error: '+error.message,'error');
  await auditLog('TRAINING_SUBMITTED','training_assignments',assignmentId,{});
  toast('Submitted for approval!','success');
  closeModal();
  await loadMyTrainings();
}

async function createUser() {

  const reports = document.getElementById('u-reports').value||null;

async function saveEditUser(id) {
  const name  = document.getElementById('eu-name').value.trim();
  const email = document.getElementById('eu-email').value.trim()||null;
  const dept  = document.getElementById('eu-dept').value||null;
  const rep   = document.getElementById('eu-reports').value||null;

  const {error} = await SB.from('users').update({full_name:name,email,department_id:dept,reports_to:rep}).eq('id',id);
  if (error) return toast('Error: '+error.message,'error');
  if (pw) {
    await SB.rpc('update_user_password',{p_user_id:id,p_new_password:pw});
    await SB.from('users').update({must_change_pw:true}).eq('id',id);

}

  await SB.from('departments').delete().eq('id',id);
  toast('Deleted.','success');await loadDepts();
}

async function pageTrainings() {
  document.getElementById('main-content').innerHTML = `
    <div class="page-header"><h1>Trainings</h1><p>Manage training modules and checklists.</p></div>
    <div class="card">
      <div class="card-header"><h2>All Trainings</h2>
        <div class="flex-row">
          <input class="search-input" placeholder="Search…" oninput="filterTable(this,'train-tbody')"/>
          ${can('manage_trainings')?'<button class="btn btn-primary btn-sm" onclick="openCreateTraining()">+ Add Training</button>':''}
        </div>
      </div>
      <div class="card-body table-wrap">
        <table><thead><tr><th>Title</th><th>Items</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="train-tbody">Loading…</tbody></table>
      </div>
    </div>`;
  await loadTrainings();
}

async function loadTrainings() {
  const {data} = await SB.from('trainings')
    .select('id,title,description,is_active,created_at,checklist_items(count)')
    .order('created_at',{ascending:false});
  const tb = document.getElementById('train-tbody');
  if (!data||data.length===0){tb.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--gray-400)">No trainings yet.</td></tr>';return;}
  tb.innerHTML = data.map(t=>`<tr>
    <td><strong>${t.title}</strong><br><small style="color:var(--gray-400)">${t.description||''}</small></td>
    <td>${t.checklist_items?.[0]?.count??0}</td>
    <td>${t.is_active?'<span class="badge badge-green">Active</span>':'<span class="badge badge-gray">Inactive</span>'}</td>
    <td class="flex-row">
      ${can('manage_trainings')?`
        <button class="btn btn-ghost btn-sm" onclick="openEditTraining('${t.id}','${esc(t.title)}','${esc(t.description||'')}',${t.is_active})">Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="manageChecklist('${t.id}','${esc(t.title)}')">Checklist</button>`:'—'}
    </td>
  </tr>`).join('');
}

function openCreateTraining(){openModal('Add Training',`
  <div class="form-group"><label>Title</label><input class="form-control" id="t-title"/></div>
  <div class="form-group"><label>Description</label><textarea class="form-control" id="t-desc"></textarea></div>`,
  [{label:'Create', action:async()=>{
    const title=document.getElementById('t-title').value.trim();
    const desc=document.getElementById('t-desc').value.trim()||null;
    if(!title)return toast('Title required.','error');
    const {error}=await SB.from('trainings').insert({title,description:desc,created_by:SESSION.user.id});
    if(error)return toast('Error: '+error.message,'error');
    toast('Training created!','success');closeModal();await loadTrainings();
  },style:'btn-primary'}]);}

function openEditTraining(id,title,desc,active){openModal('Edit Training',`
  <div class="form-group"><label>Title</label><input class="form-control" id="et-title" value="${title}"/></div>
  <div class="form-group"><label>Description</label><textarea class="form-control" id="et-desc">${desc}</textarea></div>
  <div class="form-group"><div class="checkbox-row"><input type="checkbox" id="et-active" ${active?'checked':''}/><label for="et-active">Active</label></div></div>`,
  [{label:'Save', action:async()=>{
    const t=document.getElementById('et-title').value.trim();
    const d=document.getElementById('et-desc').value.trim()||null;
    const a=document.getElementById('et-active').checked;
    if(!t)return toast('Title required.','error');
    await SB.from('trainings').update({title:t,description:d,is_active:a}).eq('id',id);
    toast('Saved!','success');closeModal();await loadTrainings();
  },style:'btn-primary'}]);}

async function manageChecklist(trainingId, trainingTitle) {
  const {data:items} = await SB.from('checklist_items')
    .select('*').eq('training_id',trainingId).order('sort_order');
  openModal(`Checklist: ${trainingTitle}`,`
    <div id="cl-manage">
      ${(items||[]).map((item,i)=>`
        <div class="checklist-item">
          <span style="color:var(--gray-400);font-size:.8rem;min-width:20px">${i+1}.</span>
          <div style="flex:1">
            <input class="form-control" style="margin-bottom:4px" value="${esc(item.description)}" id="cld-${item.id}"/>
            <div class="checkbox-row"><input type="checkbox" id="clp-${item.id}" ${item.requires_photo?'checked':''}/><label>Requires Photo</label></div>
          </div>
          <button class="btn btn-ghost btn-sm text-red" onclick="deleteCI('${item.id}','${trainingId}','${esc(trainingTitle)}')">✕</button>
        </div>`).join('')}
    </div>
    <hr class="divider"/>
    <div class="form-group"><label>New Item</label><input class="form-control" id="new-ci" placeholder="Item description"/></div>
    <div class="form-group"><div class="checkbox-row"><input type="checkbox" id="new-ci-photo"/><label>Requires Photo</label></div></div>`,
    [
      {label:'Save Edits', action:async()=>{
        for(const item of (items||[])){
          const d=document.getElementById('cld-'+item.id)?.value?.trim();
          const p=document.getElementById('clp-'+item.id)?.checked;
          if(d!==undefined) await SB.from('checklist_items').update({description:d,requires_photo:!!p}).eq('id',item.id);
        }
        toast('Saved!','success');closeModal();
      },style:'btn-outline'},
      {label:'Add Item', action:async()=>{
        const desc=document.getElementById('new-ci').value.trim();
        const photo=document.getElementById('new-ci-photo').checked;
        if(!desc)return toast('Enter description.','error');
        const nextOrder=(items?.length||0);
        await SB.from('checklist_items').insert({training_id:trainingId,description:desc,requires_photo:photo,sort_order:nextOrder});
        toast('Added!','success');closeModal();manageChecklist(trainingId,trainingTitle);
      },style:'btn-primary'},
    ]
  );
}

async function deleteCI(itemId, trainingId, trainingTitle) {
  if(!confirm('Delete this item?'))return;
  await SB.from('checklist_items').delete().eq('id',itemId);
  toast('Removed.','success');closeModal();manageChecklist(trainingId,trainingTitle);
}

async function pageWorkflows() {
  document.getElementById('main-content').innerHTML = `

function openCreateWorkflow(){openModal('New Workflow',`
  <div class="form-group"><label>Title</label><input class="form-control" id="wf-title"/></div>
  <div class="form-group"><label>Description</label><textarea class="form-control" id="wf-desc"></textarea></div>
  <div class="form-group"><div class="checkbox-row"><input type="checkbox" id="wf-seq" checked/><label for="wf-seq">Sequential (complete in order)</label></div></div>`,
  [{label:'Create', action:async()=>{
    const t=document.getElementById('wf-title').value.trim();
    const d=document.getElementById('wf-desc').value.trim()||null;
    const s=document.getElementById('wf-seq').checked;
    if(!t)return toast('Title required.','error');
    const {error}=await SB.from('workflows').insert({title:t,description:d,is_sequential:s,created_by:SESSION.user.id});
    if(error)return toast('Error: '+error.message,'error');
    toast('Created!','success');closeModal();await loadWorkflows();

function editWorkflow(id,title,desc,isSeq,isActive){openModal('Edit Workflow',`
  <div class="form-group"><label>Title</label><input class="form-control" id="ewf-title" value="${title}"/></div>
  <div class="form-group"><label>Description</label><textarea class="form-control" id="ewf-desc">${desc}</textarea></div>

  <div class="form-group"><div class="checkbox-row"><input type="checkbox" id="ewf-active" ${isActive?'checked':''}/><label for="ewf-active">Active</label></div></div>`,
  [{label:'Save', action:async()=>{
    const t=document.getElementById('ewf-title').value.trim();
    const d=document.getElementById('ewf-desc').value.trim()||null;
    const s=document.getElementById('ewf-seq').checked;
    const a=document.getElementById('ewf-active').checked;
    if(!t)return toast('Title required.','error');
    await SB.from('workflows').update({title:t,description:d,is_sequential:s,is_active:a}).eq('id',id);
    toast('Saved!','success');closeModal();await loadWorkflows();
  },style:'btn-primary'}]);}

async function manageWFTrainings(wfId, wfTitle) {
  const [{data:all},{data:cur}] = await Promise.all([
    SB.from('trainings').select('id,title').eq('is_active',true).order('title'),
    SB.from('workflow_trainings').select('id,training_id,sort_order,trainings(title)').eq('workflow_id',wfId).order('sort_order'),
  ]);
  const curIds = new Set((cur||[]).map(c=>c.training_id));
  const avail = (all||[]).filter(t=>!curIds.has(t.id));
  openModal(`Trainings in: ${wfTitle}`,`
    <p style="font-size:.82rem;color:var(--gray-600);margin-bottom:10px">Current trainings:</p>
    ${(cur||[]).map((c,i)=>`
      <div class="flex-row" style="padding:8px;background:var(--gray-50);border-radius:6px;margin-bottom:6px">
        <span>${i+1}. ${c.trainings?.title||'?'}</span>
        <button class="btn btn-ghost btn-sm text-red" style="margin-left:auto" onclick="removeWFTraining('${c.id}','${wfId}','${esc(wfTitle)}')">✕</button>
      </div>`).join('')}
    ${cur?.length===0?'<p style="color:var(--gray-400);font-size:.85rem;margin-bottom:12px">No trainings added yet.</p>':''}
    <hr class="divider"/>
    <div class="form-group"><label>Add Training</label>
      <select class="form-control" id="wft-sel"><option value="">— Select —</option>
        ${avail.map(t=>`<option value="${t.id}">${t.title}</option>`).join('')}</select></div>`,
    [{label:'Add', action:async()=>{
      const tid=document.getElementById('wft-sel').value;
      if(!tid)return toast('Select a training.','error');
      const nextOrder=(cur?.length||0);
      await SB.from('workflow_trainings').insert({workflow_id:wfId,training_id:tid,sort_order:nextOrder});
      toast('Added!','success');closeModal();manageWFTrainings(wfId,wfTitle);
    },style:'btn-primary'}]
  );
}

async function removeWFTraining(rowId,wfId,wfTitle){
  await SB.from('workflow_trainings').delete().eq('id',rowId);
  toast('Removed.','success');closeModal();manageWFTrainings(wfId,wfTitle);
}

async function pageAssign() {
  document.getElementById('main-content').innerHTML = `
    <div class="page-header"><h1>Assign Trainings</h1></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('assign-single','assign-workflow',this)">Single Training</div>
      <div class="tab" onclick="switchTab('assign-workflow','assign-single',this)">Workflow</div>
    </div>
    <div id="assign-single"><div class="card"><div class="card-body" id="as-body">Loading…</div></div></div>
    <div id="assign-workflow" style="display:none"><div class="card"><div class="card-body" id="aw-body">Loading…</div></div></div>`;
  await renderAssignSingle();
}

function switchTab(show,hide,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(show).style.display='';
  document.getElementById(hide).style.display='none';
  if(show==='assign-workflow') renderAssignWorkflow();
}

async function renderAssignSingle(){
  const [{data:users},{data:trainings}] = await Promise.all([
    SB.from('users').select('id,full_name,employee_id').eq('is_active',true).order('full_name'),
    SB.from('trainings').select('id,title').eq('is_active',true).order('title'),
  ]);
  document.getElementById('as-body').innerHTML=`
    <div class="form-group"><label>Employee</label>
      <select class="form-control" id="as-user"><option value="">— Select —</option>
        ${(users||[]).map(u=>`<option value="${u.id}">${u.full_name} (${u.employee_id})</option>`).join('')}</select></div>
    <div class="form-group"><label>Training</label>
      <select class="form-control" id="as-train"><option value="">— Select —</option>
        ${(trainings||[]).map(t=>`<option value="${t.id}">${t.title}</option>`).join('')}</select></div>
    <button class="btn btn-primary" onclick="doAssignSingle()">Assign Training</button>`;
}

async function doAssignSingle(){
  const userId=document.getElementById('as-user').value;
  const trainId=document.getElementById('as-train').value;
  if(!userId||!trainId)return toast('Select both employee and training.','error');
  const {data:dup}=await SB.from('training_assignments').select('id')
    .eq('assigned_to',userId).eq('training_id',trainId).in('status',['pending','in_progress','submitted']).maybeSingle();
  if(dup)return toast('Already has an active assignment for this training.','error');
  const {error}=await SB.from('training_assignments').insert({training_id:trainId,assigned_to:userId,assigned_by:SESSION.user.id,status:'pending'});
  if(error)return toast('Error: '+error.message,'error');
  await auditLog('TRAINING_ASSIGNED','training_assignments',null,{assigned_to:userId,training_id:trainId});
  toast('Training assigned!','success');
}

async function renderAssignWorkflow(){
  const [{data:users},{data:workflows}] = await Promise.all([
    SB.from('users').select('id,full_name,employee_id').eq('is_active',true).order('full_name'),
    SB.from('workflows').select('id,title').eq('is_active',true).order('title'),
  ]);
  document.getElementById('aw-body').innerHTML=`
    <div class="form-group"><label>Employee</label>
      <select class="form-control" id="aw-user"><option value="">— Select —</option>
        ${(users||[]).map(u=>`<option value="${u.id}">${u.full_name} (${u.employee_id})</option>`).join('')}</select></div>
    <div class="form-group"><label>Workflow</label>
      <select class="form-control" id="aw-wf"><option value="">— Select —</option>
        ${(workflows||[]).map(w=>`<option value="${w.id}">${w.title}</option>`).join('')}</select></div>
    <button class="btn btn-primary" onclick="doAssignWorkflow()">Assign Workflow</button>`;
}

async function doAssignWorkflow(){
  const userId=document.getElementById('aw-user').value;
  const wfId=document.getElementById('aw-wf').value;
  if(!userId||!wfId)return toast('Select both.','error');
  const {data:wa,error:wae}=await SB.from('workflow_assignments')
    .insert({workflow_id:wfId,assigned_to:userId,assigned_by:SESSION.user.id,status:'pending'}).select().single();
  if(wae)return toast('Error: '+wae.message,'error');
  const {data:wts}=await SB.from('workflow_trainings').select('training_id,sort_order').eq('workflow_id',wfId).order('sort_order');
  if(!wts||wts.length===0){await SB.from('workflow_assignments').delete().eq('id',wa.id);return toast('Workflow has no trainings.','error');}
  const {error:tae}=await SB.from('training_assignments').insert(wts.map(wt=>({
    training_id:wt.training_id,assigned_to:userId,assigned_by:SESSION.user.id,
    workflow_assignment_id:wa.id,status:'pending'
  })));
  if(tae){await SB.from('workflow_assignments').delete().eq('id',wa.id);return toast('Error creating assignments.','error');}
  await auditLog('WORKFLOW_ASSIGNED','workflow_assignments',wa.id,{assigned_to:userId,workflow_id:wfId});
  toast('Workflow assigned!','success');
}

async function changeSelfPw(){
  const p1=document.getElementById('s-pw1').value;
  const p2=document.getElementById('s-pw2').value;
  if(p1.length<8)return toast('Min 8 characters.','error');
  if(p1!==p2)return toast('Passwords do not match.','error');
  const {error}=await SB.rpc('update_user_password',{p_user_id:SESSION.user.id,p_new_password:p1});
  if(error)return toast('Error: '+error.message,'error');
  toast('Password updated!','success');
  document.getElementById('s-pw1').value='';document.getElementById('s-pw2').value='';
}

function saveConn(){
  localStorage.setItem('sb_url',document.getElementById('s-url').value.trim());
  localStorage.setItem('sb_key',document.getElementById('s-key').value.trim());
  toast('Saved. Please sign in again.','info');
  logout();
}

═══════════════════════════════ */
function openModal(title, bodyHtml, buttons=[]) {
  document.getElementById('gm-title').textContent = title;
  document.getElementById('gm-body').innerHTML = bodyHtml;
  const footer = document.getElementById('gm-footer');
  footer.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = `btn ${b.style||'btn-outline'}`;
    btn.textContent = b.label;
    btn.onclick = b.action;
    footer.appendChild(btn);
  });
  document.getElementById('generic-modal').classList.add('open');
}

function closeModal() { document.getElementById('generic-modal').classList.remove('open'); }

document.getElementById('generic-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

   HELPERS
═══════════════════════════════ */
async function auditLog(action, entityType, entityId, detail) {
  try { await SB.from('audit_log').insert({actor_id:SESSION?.user?.id||null,action,entity_type:entityType,entity_id:entityId||null,detail}); } catch(_){}
}

function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function fmtDate(iso) { if(!iso)return'—'; return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(iso) { if(!iso)return'—'; return new Date(iso).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function esc(s) { return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }
function filterTable(input, tbodyId) {
  const q = input.value.toLowerCase();
  const tb = document.getElementById(tbodyId);
  if(!tb)return;
  Array.from(tb.rows).forEach(row => { row.style.display = row.textContent.toLowerCase().includes(q)?'':'none'; });
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
  document.querySelector('.theme-btn').textContent = next==='dark'?'☀️':'🌙';
}

// fix report tab switching to also load data
const origSwitch = switchTab;
window.switchTab = function(show, hide, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(show).style.display='';
  document.getElementById(hide).style.display='none';
  if(show==='assign-workflow') renderAssignWorkflow();
  if(show==='rep-audit') loadAuditReport();
};
</script>
