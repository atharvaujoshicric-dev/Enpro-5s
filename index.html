<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enpro — Training Management</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root {
  --red:       #C0202A;
  --red-dark:  #96181F;
  --red-light: #FDECEA;
  --white:     #FFFFFF;
  --black:     #111111;
  --gray-50:   #F8F8F8;
  --gray-100:  #EFEFEF;
  --gray-200:  #DEDEDE;
  --gray-400:  #999999;
  --gray-600:  #555555;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.10);
  --shadow:    0 3px 12px rgba(0,0,0,.12);
  --radius:    8px;
  --transition: .18s ease;
}
[data-theme="dark"] {
  --white:    #1A1A1A;
  --black:    #F0F0F0;
  --gray-50:  #222222;
  --gray-100: #2A2A2A;
  --gray-200: #363636;
  --gray-400: #777777;
  --gray-600: #AAAAAA;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.40);
  --shadow:    0 3px 12px rgba(0,0,0,.45);
}

/* ── RESET ───────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray-50);color:var(--black);font-size:15px;line-height:1.5}
button{cursor:pointer;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}
a{color:var(--red);text-decoration:none}

/* ── SETUP SCREEN ────────────────────────────────────────── */
#setup-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--gray-50)}
.setup-card{background:var(--white);border-radius:12px;padding:36px;max-width:460px;width:100%;box-shadow:var(--shadow)}
.setup-card .logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.setup-card .logo .dot{width:14px;height:14px;background:var(--red);border-radius:50%}
.setup-card h1{font-size:1.4rem;font-weight:700;margin-bottom:4px}
.setup-card p{color:var(--gray-600);margin-bottom:24px;font-size:.9rem}

/* ── LOGIN SCREEN ────────────────────────────────────────── */
#login-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--gray-50)}
.login-card{background:var(--white);border-radius:12px;padding:36px;max-width:400px;width:100%;box-shadow:var(--shadow)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.login-logo .brand-mark{width:38px;height:38px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1.1rem}
.login-logo h2{font-size:1.25rem;font-weight:700}
.login-logo span{font-size:.8rem;color:var(--gray-400);display:block}

/* ── APP SHELL ───────────────────────────────────────────── */
#app{display:none;height:100vh;overflow:hidden;flex-direction:column}
.topbar{height:52px;background:var(--red);color:#fff;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100}
.topbar .burger{background:none;border:none;color:#fff;font-size:1.4rem;padding:4px;display:none}
.topbar .brand{font-weight:700;font-size:1rem;letter-spacing:.02em;flex:1}
.topbar .user-chip{background:rgba(255,255,255,.18);border-radius:20px;padding:4px 12px;font-size:.8rem;display:flex;align-items:center;gap:8px}
.topbar .theme-btn{background:none;border:none;color:#fff;font-size:1.1rem;padding:4px 8px;border-radius:4px;transition:background var(--transition)}
.topbar .theme-btn:hover{background:rgba(255,255,255,.15)}

.app-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;background:var(--white);border-right:1px solid var(--gray-200);overflow-y:auto;flex-shrink:0;transition:transform var(--transition)}
.sidebar nav{padding:12px 0}
.nav-section{padding:6px 16px 2px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);margin-top:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:var(--gray-600);cursor:pointer;transition:background var(--transition),color var(--transition);border-radius:0;font-size:.88rem}
.nav-item:hover{background:var(--gray-50);color:var(--black)}
.nav-item.active{background:var(--red-light);color:var(--red);font-weight:600}
[data-theme="dark"] .nav-item.active{background:rgba(192,32,42,.15)}
.nav-item .icon{width:18px;text-align:center;font-size:1rem}

.main{flex:1;overflow-y:auto;padding:24px}
@media(max-width:768px){
  .topbar .burger{display:block}
  .sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:200;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{padding:16px}
}

/* ── FORMS & INPUTS ──────────────────────────────────────── */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-control{width:100%;padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius);background:var(--white);color:var(--black);outline:none;transition:border-color var(--transition)}
.form-control:focus{border-color:var(--red)}
.form-control:disabled{background:var(--gray-100);color:var(--gray-400)}
textarea.form-control{resize:vertical;min-height:80px}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:.88rem}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--red)}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--radius);font-weight:600;font-size:.88rem;border:none;transition:all var(--transition);white-space:nowrap}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-dark)}
.btn-outline{background:transparent;border:1.5px solid var(--gray-200);color:var(--black)}
.btn-outline:hover{border-color:var(--red);color:var(--red)}
.btn-ghost{background:transparent;border:none;color:var(--gray-600);padding:6px 10px}
.btn-ghost:hover{color:var(--red)}
.btn-danger{background:#fee2e2;color:#b91c1c;border:none}
.btn-danger:hover{background:#fca5a5}
.btn-sm{padding:5px 12px;font-size:.8rem}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── CARDS ───────────────────────────────────────────────── */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--gray-100)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-header h2{font-size:1rem;font-weight:700}
.card-body{padding:20px}

/* ── PAGE HEADER ─────────────────────────────────────────── */
.page-header{margin-bottom:20px}
.page-header h1{font-size:1.3rem;font-weight:700}
.page-header p{font-size:.88rem;color:var(--gray-600);margin-top:2px}

/* ── TABLE ───────────────────────────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{padding:10px 14px;text-align:left;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);border-bottom:2px solid var(--gray-100);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}

/* ── BADGES ──────────────────────────────────────────────── */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-green{background:#dcfce7;color:#15803d}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-yellow{background:#fef9c3;color:#a16207}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1rem;font-weight:700}
.modal-close{background:none;border:none;font-size:1.2rem;color:var(--gray-400);cursor:pointer;padding:4px}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:8px}

/* ── TOAST ───────────────────────────────────────────────── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 18px;border-radius:var(--radius);font-size:.85rem;font-weight:600;color:#fff;box-shadow:var(--shadow);pointer-events:all;animation:slideIn .2s ease;max-width:320px}
.toast-success{background:#16a34a}
.toast-error{background:var(--red)}
.toast-info{background:#2563eb}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── DASHBOARD STATS ─────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-100)}
.stat-card .val{font-size:1.8rem;font-weight:800;color:var(--red);line-height:1}
.stat-card .lbl{font-size:.78rem;color:var(--gray-400);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* ── CHECKLIST ───────────────────────────────────────────── */
.checklist-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-100)}
.checklist-item:last-child{border-bottom:none}
.checklist-item input[type=checkbox]{width:18px;height:18px;margin-top:1px;accent-color:var(--red);flex-shrink:0}
.checklist-item .item-desc{flex:1;font-size:.9rem}
.checklist-item .photo-label{font-size:.75rem;color:var(--red);font-weight:600;margin-top:4px;display:block}
.photo-preview{width:72px;height:72px;border-radius:6px;object-fit:cover;border:2px solid var(--gray-200);cursor:pointer}

/* ── PERMISSION GRID ─────────────────────────────────────── */
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:480px){.perm-grid{grid-template-columns:1fr}}
.perm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:.82rem;cursor:pointer;transition:border-color var(--transition)}
.perm-item:hover{border-color:var(--red)}
.perm-item input{accent-color:var(--red)}

/* ── WORKFLOW BUILDER ────────────────────────────────────── */
.wf-training-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--gray-50);border-radius:6px;margin-bottom:6px;font-size:.85rem}
.wf-training-item .drag-handle{color:var(--gray-400);cursor:grab;font-size:1rem}
.wf-training-item .remove-btn{margin-left:auto;color:var(--red);background:none;border:none;font-size:1rem;cursor:pointer}

/* ── EMPTY STATE ─────────────────────────────────────────── */
.empty-state{text-align:center;padding:48px 24px;color:var(--gray-400)}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px}
.empty-state p{font-size:.9rem}

/* ── PROGRESS BAR ────────────────────────────────────────── */
.progress-bar-wrap{background:var(--gray-100);border-radius:20px;height:7px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--red);border-radius:20px;transition:width .3s}

/* ── TABS ────────────────────────────────────────────────── */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--gray-100);margin-bottom:20px}
.tab{padding:8px 16px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--gray-400);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all var(--transition)}
.tab.active{color:var(--red);border-color:var(--red)}

/* ── MISC ────────────────────────────────────────────────── */
.divider{border:none;border-top:1px solid var(--gray-100);margin:16px 0}
.text-red{color:var(--red)}
.flex-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-input{padding:7px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius);background:var(--white);color:var(--black);outline:none;font-size:.88rem;min-width:180px;transition:border-color var(--transition)}
.search-input:focus{border-color:var(--red)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;background:var(--gray-100);border-radius:20px;font-size:.78rem;color:var(--gray-600)}
</style>
</head>
<body>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- ══ SETUP SCREEN ══════════════════════════════════════════ -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="logo"><div class="dot"></div><strong>Enpro Training</strong></div>
    <h1>Connect to Supabase</h1>
    <p>Enter your Supabase project credentials. These are saved locally in your browser.</p>
    <div class="form-group">
      <label>Supabase Project URL</label>
      <input class="form-control" id="sb-url" placeholder="https://xxxx.supabase.co"/>
    </div>
    <div class="form-group">
      <label>Supabase Anon Key</label>
      <input class="form-control" id="sb-key" placeholder="eyJhbGciOi..."/>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="saveSetup()">Save & Continue</button>
  </div>
</div>

<!-- ══ LOGIN SCREEN ══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand-mark">E</div>
      <div><h2>Enpro Industries</h2><span>Training Management System</span></div>
    </div>
    <div class="form-group">
      <label>Employee ID</label>
      <input class="form-control" id="login-emp" placeholder="e.g. ADMIN-001" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-control" type="password" id="login-pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="doLogin()" id="login-btn">Sign In</button>
    <p style="font-size:.78rem;color:var(--gray-400);margin-top:14px;text-align:center">
      <a href="#" onclick="clearSetup()">Change Supabase connection</a>
    </p>
  </div>
</div>

<!-- ══ FORCE PASSWORD CHANGE MODAL ═══════════════════════════ -->
<div class="modal-overlay" id="pw-change-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>🔒 Set Your Password</h3>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:16px;font-size:.88rem;color:var(--gray-600)">You must set a new password before continuing.</p>
      <div class="form-group">
        <label>New Password</label>
        <input class="form-control" type="password" id="new-pw1" placeholder="Min 8 characters"/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input class="form-control" type="password" id="new-pw2" placeholder="Repeat password"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="submitNewPassword()">Update Password</button>
    </div>
  </div>
</div>

<!-- ══ APP SHELL ═════════════════════════════════════════════ -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <button class="burger" onclick="toggleSidebar()">☰</button>
    <div class="brand">Enpro Training</div>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
    <div class="user-chip">
      <span>👤</span>
      <span id="topbar-user">—</span>
      <button style="background:none;border:none;color:#fff;cursor:pointer;font-size:.8rem;padding:0" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="app-body">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <nav id="sidebar-nav">
        <!-- built dynamically -->
      </nav>
    </div>

    <!-- Main area -->
    <div class="main" id="main-content">
      <!-- pages rendered here -->
    </div>
  </div>
</div>

<!-- ══ GENERIC MODAL ══════════════════════════════════════════ -->
<div class="modal-overlay" id="generic-modal">
  <div class="modal" id="generic-modal-inner">
    <div class="modal-header">
      <h3 id="gm-title">—</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="gm-body"></div>
    <div class="modal-footer" id="gm-footer"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   GLOBALS
═══════════════════════════════════════════════════════════ */
let SB = null;      // supabase client
let SESSION = null; // { user, permissions[] }

const PERMISSIONS = [
  { key:'manage_users',        label:'Manage Users',        icon:'👥' },
  { key:'manage_departments',  label:'Manage Departments',  icon:'🏢' },
  { key:'manage_trainings',    label:'Manage Trainings',    icon:'📋' },
  { key:'manage_workflows',    label:'Manage Workflows',    icon:'🔄' },
  { key:'assign_trainings',    label:'Assign Trainings',    icon:'📌' },
  { key:'approve_completions', label:'Approve Completions', icon:'✅' },
  { key:'view_reports',        label:'View Reports',        icon:'📊' },
];

const STATUS_BADGE = {
  pending:     '<span class="badge badge-gray">Pending</span>',
  in_progress: '<span class="badge badge-blue">In Progress</span>',
  submitted:   '<span class="badge badge-yellow">Submitted</span>',
  approved:    '<span class="badge badge-green">Approved</span>',
  rejected:    '<span class="badge badge-red">Rejected</span>',
};

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  const url = localStorage.getItem('sb_url');
  const key = localStorage.getItem('sb_key');
  if (url && key) {
    SB = supabase.createClient(url, key);
    show('login-screen');
  } else {
    show('setup-screen');
  }
  // pre-fill
  document.getElementById('sb-url').value = url || '';
  document.getElementById('sb-key').value = key || '';
  // theme
  const t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
});

function show(id) {
  ['setup-screen','login-screen','app'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = (s === id) ? (id === 'app' ? 'flex' : 'flex') : 'none';
  });
}

/* ═══════════════════════════════════════════════════════════
   SETUP
═══════════════════════════════════════════════════════════ */
function saveSetup() {
  const url = document.getElementById('sb-url').value.trim();
  const key = document.getElementById('sb-key').value.trim();
  if (!url || !key) return toast('Fill in both fields.','error');
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  SB = supabase.createClient(url, key);
  show('login-screen');
  toast('Connection saved!','success');
}

function clearSetup() {
  localStorage.removeItem('sb_url');
  localStorage.removeItem('sb_key');
  show('setup-screen');
}

/* ═══════════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════════ */
async function doLogin() {
  const empId = document.getElementById('login-emp').value.trim().toUpperCase();
  const pw    = document.getElementById('login-pw').value;
  if (!empId || !pw) return toast('Enter your Employee ID and password.', 'error');

  document.getElementById('login-btn').disabled = true;
  document.getElementById('login-btn').textContent = 'Signing in…';

  try {
    // Step 1: fetch user row by employee_id
    const { data: user, error: ue } = await SB
      .from('users')
      .select('id,employee_id,full_name,email,is_admin,is_active,must_change_pw,department_id,reports_to')
      .eq('employee_id', empId)
      .eq('is_active', true)
      .maybeSingle();

    if (ue) { toast('DB error: ' + ue.message, 'error'); return; }
    if (!user) { toast('Employee ID not found.', 'error'); return; }

    // Step 2: verify password via RPC
    const { data: valid, error: ve } = await SB.rpc('check_user_password', {
      p_user_id: user.id,
      p_password: pw
    });

    if (ve) { toast('Password check error: ' + ve.message, 'error'); return; }
    if (!valid) { toast('Incorrect password.', 'error'); return; }

    // Step 3: load session
    await loadSession(user);

  } catch(e) {
    toast('Login error: ' + (e.message || String(e)), 'error');
  }

  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Sign In';
}

async function loadSession(user) {
  // Set session variable for RLS
  try { await SB.rpc('set_app_user', { p_user_id: user.id }); } catch(e) {}

  // Load permissions
  const { data: perms } = await SB
    .from('user_permissions')
    .select('permission')
    .eq('user_id', user.id);

  SESSION = {
    user,
    permissions: (perms || []).map(p => p.permission),
  };

  // Store in sessionStorage for page refreshes
  sessionStorage.setItem('session', JSON.stringify(SESSION));

  document.getElementById('topbar-user').textContent =
    user.full_name + (user.is_admin ? ' (Admin)' : '');

  if (user.must_change_pw) {
    openPwModal();
    return;
  }

  show('app');
  buildNav();
  renderPage('dashboard');
}

function logout() {
  SESSION = null;

═══════════════════════════════════════════════════════════ */
function openPwModal() {
  document.getElementById('pw-change-modal').classList.add('open');
}

async function submitNewPassword() {
  const p1 = document.getElementById('new-pw1').value;
  const p2 = document.getElementById('new-pw2').value;
  if (p1.length < 8) return toast('Minimum 8 characters.','error');
  if (p1 !== p2) return toast('Passwords do not match.','error');

  const { error } = await SB.rpc('update_user_password', {
    p_user_id: SESSION.user.id,
    p_new_password: p1
  });
  if (error) return toast('Could not update password. Check RPC functions.','error');

  SESSION.user.must_change_pw = false;
  document.getElementById('pw-change-modal').classList.remove('open');
  toast('Password updated!','success');
  show('app');
  buildNav();
  renderPage('dashboard');
}

/* ═══════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════ */
function can(perm) {
  if (!SESSION) return false;
  if (SESSION.user.is_admin) return true;
  return SESSION.permissions.includes(perm);
}

function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';

  const pages = [
    { id:'dashboard', label:'Dashboard',   icon:'📊', always:true },
    { id:'my-trainings', label:'My Trainings', icon:'📋', always:true },
    { id:'approvals', label:'Approvals',   icon:'✅', perm:'approve_completions' },
    { section: 'Management' },
    { id:'users', label:'Users',           icon:'👥', perm:'manage_users' },
    { id:'departments', label:'Departments', icon:'🏢', perm:'manage_departments' },
    { id:'trainings', label:'Trainings',   icon:'📚', perm:'manage_trainings' },
    { id:'workflows', label:'Workflows',   icon:'🔄', perm:'manage_workflows' },
    { id:'assign', label:'Assign',         icon:'📌', perm:'assign_trainings' },
    { section: 'Admin', admin:true },
    { id:'reports', label:'Reports',       icon:'📈', perm:'view_reports' },
    { id:'settings', label:'Settings',     icon:'⚙️', admin:true },
  ];

  pages.forEach(p => {
    if (p.section) {
      if (p.admin && !SESSION.user.is_admin) return;
      const el = document.createElement('div');
      el.className = 'nav-section';
      el.textContent = p.section;
      nav.appendChild(el);
      return;
    }
    if (!p.always && p.admin && !SESSION.user.is_admin) return;
    if (p.perm && !can(p.perm)) return;
    const el = document.createElement('div');
    el.className = 'nav-item';
    el.dataset.page = p.id;
    el.innerHTML = `<span class="icon">${p.icon}</span> ${p.label}`;
    el.onclick = () => { renderPage(p.id); closeSidebar(); };
    nav.appendChild(el);
  });
}

function setActiveNav(pageId) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === pageId);
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

function renderPage(id) {
  setActiveNav(id);
  const mc = document.getElementById('main-content');
  mc.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray-400)">Loading…</div>';
  const pages = {
    'dashboard':    pageDashboard,
    'my-trainings': pageMyTrainings,
    'approvals':    pageApprovals,
    'users':        pageUsers,
    'departments':  pageDepartments,
    'trainings':    pageTrainings,
    'workflows':    pageWorkflows,
    'assign':       pageAssign,
    'reports':      pageReports,
    'settings':     pageSettings,
  };
  if (pages[id]) pages[id]();
}

async function pageDashboard() {
  const mc = document.getElementById('main-content');

  // fetch counts
  const [uRes, tRes, wRes, aRes] = await Promise.all([
    SB.from('users').select('id', {count:'exact',head:true}).eq('is_active',true),
    SB.from('trainings').select('id', {count:'exact',head:true}).eq('is_active',true),
    SB.from('workflows').select('id', {count:'exact',head:true}).eq('is_active',true),
    SB.from('training_assignments').select('id', {count:'exact',head:true}).eq('assigned_to', SESSION.user.id).neq('status','approved'),
  ]);

  let pendingApprovals = 0;
  if (can('approve_completions')) {
    const { count } = await SB.from('training_assignments')
      .select('id',{count:'exact',head:true})
      .eq('status','submitted');
    pendingApprovals = count || 0;

  mc.innerHTML = `
    <div class="page-header">
      <h1>Dashboard</h1>
      <p>Welcome back, ${SESSION.user.full_name}</p>
    </div>
    <div class="stats-grid">
      ${SESSION.user.is_admin ? `
      <div class="stat-card"><div class="val">${uRes.count||0}</div><div class="lbl">Active Users</div></div>
      <div class="stat-card"><div class="val">${tRes.count||0}</div><div class="lbl">Trainings</div></div>
      <div class="stat-card"><div class="val">${wRes.count||0}</div><div class="lbl">Workflows</div></div>` : ''}
      <div class="stat-card"><div class="val">${aRes.count||0}</div><div class="lbl">My Pending</div></div>
      ${pendingApprovals > 0 ? `<div class="stat-card"><div class="val text-red">${pendingApprovals}</div><div class="lbl">Awaiting Approval</div></div>` : ''}
    </div>
    <div class="card">
      <div class="card-header"><h2>My Recent Assignments</h2></div>
      <div class="card-body" id="dash-recent">Loading…</div>
    </div>`;

  // recent assignments
  const { data: recents } = await SB
    .from('training_assignments')
    .select('id, status, created_at, trainings(title)')
    .eq('assigned_to', SESSION.user.id)
    .order('created_at', {ascending:false})
    .limit(5);

  const db = document.getElementById('dash-recent');

          <td>${fmtDate(r.created_at)}</td>

  }

async function openChecklist(assignmentId) {
  // Load assignment with checklist items and existing completions
  const { data: ta } = await SB
    .from('training_assignments')
    .select('id, status, trainings(id, title)')
    .eq('id', assignmentId)
    .single();

  const { data: items } = await SB
    .from('checklist_items')
    .select('id, description, requires_photo, sort_order')
    .eq('training_id', ta.trainings.id)
    .order('sort_order');

  const { data: completions } = await SB
    .from('checklist_item_completions')
    .select('id, checklist_item_id, is_done, photo_url')
    .eq('training_assignment_id', assignmentId);

  const compMap = {};
  (completions || []).forEach(c => { compMap[c.checklist_item_id] = c; });

  const isEditable = ['pending','in_progress','rejected'].includes(ta.status);

  openModal(`Checklist: ${ta.trainings.title}`, `
    <div id="checklist-wrap">
      ${items && items.length > 0 ? items.map(item => {
        const comp = compMap[item.id];
        const done = comp?.is_done || false;
        return `
        <div class="checklist-item" id="ci-${item.id}">
          <input type="checkbox" id="chk-${item.id}" ${done?'checked':''} ${isEditable?'':'disabled'}
            onchange="toggleChecklistItem('${assignmentId}','${item.id}',this.checked)"/>
          <div class="item-desc">
            <div>${item.description}</div>
            ${item.requires_photo ? `<span class="photo-label">📷 Photo required</span>
              ${comp?.photo_url ? `<br><img src="${comp.photo_url}" class="photo-preview" onclick="window.open('${comp.photo_url}')"/>` : ''}
              ${isEditable ? `<br><input type="file" accept="image/*" capture="environment" style="margin-top:6px;font-size:.78rem"
                onchange="uploadChecklistPhoto('${assignmentId}','${item.id}',this)"/>` : ''}
            ` : ''}
          </div>
        </div>`;
      }).join('') : '<p style="color:var(--gray-400)">No checklist items defined for this training.</p>'}
    </div>`,
    isEditable ? [
      { label:'Save Progress', action: () => saveChecklistProgress(assignmentId), style:'btn-outline' },
      { label:'Submit for Approval', action: () => submitTraining(assignmentId), style:'btn-primary' },
    ] : []
  );
}

async function toggleChecklistItem(assignmentId, itemId, checked) {
  // upsert completion record
  const { data: existing } = await SB
    .from('checklist_item_completions')
    .select('id')
    .eq('training_assignment_id', assignmentId)
    .eq('checklist_item_id', itemId)
    .maybeSingle();

  if (existing) {
    await SB.from('checklist_item_completions').update({
      is_done: checked,
      completed_at: checked ? new Date().toISOString() : null
    }).eq('id', existing.id);
  } else {
    await SB.from('checklist_item_completions').insert({
      training_assignment_id: assignmentId,
      checklist_item_id: itemId,
      is_done: checked,
      completed_at: checked ? new Date().toISOString() : null
    });
  }

  // Update assignment to in_progress if needed
  await SB.from('training_assignments')
    .update({ status: 'in_progress' })
    .eq('id', assignmentId)
    .eq('status', 'pending');
}

async function uploadChecklistPhoto(assignmentId, itemId, input) {
  const file = input.files[0];
  if (!file) return;
  toast('Uploading photo…','info');
  const ext = file.name.split('.').pop();
  const path = `${assignmentId}/${itemId}.${ext}`;
  const { error } = await SB.storage.from('training-photos').upload(path, file, { upsert: true });
  if (error) return toast('Upload failed: ' + error.message,'error');

  const { data: urlData } = SB.storage.from('training-photos').getPublicUrl(path);
  const photoUrl = urlData.publicUrl;

  // Upsert completion with photo
  const { data: existing } = await SB
    .from('checklist_item_completions')
    .select('id')
    .eq('training_assignment_id', assignmentId)
    .eq('checklist_item_id', itemId)
    .maybeSingle();

  if (existing) {
    await SB.from('checklist_item_completions').update({ photo_url: photoUrl }).eq('id', existing.id);
  } else {
    await SB.from('checklist_item_completions').insert({
      training_assignment_id: assignmentId,
      checklist_item_id: itemId,
      is_done: false,
      photo_url: photoUrl
    });
  }
  toast('Photo uploaded!','success');
}

async function saveChecklistProgress(assignmentId) {
  toast('Progress saved.','success');
  closeModal();
  await loadMyTrainings();
}

async function submitTraining(assignmentId) {
  // Check all required photos are uploaded
  const { data: ta } = await SB
    .from('training_assignments')
    .select('id, trainings(id)')
    .eq('id', assignmentId)
    .single();

  const { data: items } = await SB
    .from('checklist_items')
    .select('id, requires_photo')
    .eq('training_id', ta.trainings.id)
    .eq('requires_photo', true);

  if (items && items.length > 0) {
    const { data: comps } = await SB
      .from('checklist_item_completions')
      .select('checklist_item_id, photo_url')
      .eq('training_assignment_id', assignmentId)
      .in('checklist_item_id', items.map(i=>i.id));

    const missingPhoto = items.some(item => {
      const c = (comps||[]).find(c => c.checklist_item_id === item.id);
      return !c?.photo_url;
    });
    if (missingPhoto) return toast('Please upload all required photos before submitting.','error');
  }

  const { error } = await SB
    .from('training_assignments')
    .update({ status: 'submitted' })
    .eq('id', assignmentId);

  if (error) return toast('Error submitting.','error');

  await auditLog('TRAINING_SUBMITTED', 'training_assignments', assignmentId, {});
  toast('Submitted for approval!','success');
  closeModal();
  await loadMyTrainings();
}

async function approveTraining(assignmentId) {
  const { error } = await SB
    .from('training_assignments')
    .update({ status:'approved', approved_by: SESSION.user.id, approved_at: new Date().toISOString(), remarks: null })
    .eq('id', assignmentId);
  if (error) return toast('Error approving.','error');
  await auditLog('TRAINING_APPROVED','training_assignments', assignmentId, { approver: SESSION.user.id });
  toast('Training approved!','success');
  pageApprovals();
}

function rejectTrainingPrompt(assignmentId) {
  openModal('Reject Training', `
    <div class="form-group">
      <label>Reason / Remarks</label>
      <textarea class="form-control" id="reject-remarks" placeholder="Explain what needs to be redone…"></textarea>
    </div>`,
    [{ label:'Reject & Send Back', action: () => rejectTraining(assignmentId), style:'btn-danger' }]
  );
}

async function rejectTraining(assignmentId) {
  const remarks = document.getElementById('reject-remarks').value.trim();
  if (!remarks) return toast('Please enter a reason.','error');
  const { error } = await SB
    .from('training_assignments')
    .update({ status:'rejected', remarks, approved_by: SESSION.user.id, approved_at: new Date().toISOString() })
    .eq('id', assignmentId);
  if (error) return toast('Error rejecting.','error');
  await auditLog('TRAINING_REJECTED','training_assignments', assignmentId, { remarks });
  toast('Sent back to employee.','success');
  closeModal();
  pageApprovals();
}

function generateTempPw() {
  return 'Tmp' + Math.random().toString(36).slice(2,8).toUpperCase() + '!';
}

async function createUser() {
  const empId = document.getElementById('u-emp').value.trim().toUpperCase();
  const name  = document.getElementById('u-name').value.trim();
  const email = document.getElementById('u-email').value.trim() || null;
  const dept  = document.getElementById('u-dept').value || null;
  const rep   = document.getElementById('u-reports').value || null;
  const pw    = document.getElementById('u-pw').value;
  const isAdmin = document.getElementById('u-admin').checked;

  if (!empId || !name || !pw) return toast('Employee ID, Name, and Password are required.','error');

  const { error } = await SB.rpc('create_user_with_password', {
    p_employee_id: empId,
    p_full_name: name,
    p_email: email,
    p_department_id: dept,
    p_reports_to: rep,
    p_password: pw,
    p_is_admin: isAdmin,
    p_created_by: SESSION.user.id
  });

  if (error) return toast('Error: ' + error.message,'error');

  await auditLog('USER_CREATED','users', null, { employee_id: empId, created_by: SESSION.user.id });
  toast(`User ${empId} created! Temp password: ${pw}`,'success');
  closeModal();
  await loadUsersTable();
}

async function saveEditUser(userId) {
  const name  = document.getElementById('eu-name').value.trim();
  const email = document.getElementById('eu-email').value.trim() || null;
  const dept  = document.getElementById('eu-dept').value || null;
  const rep   = document.getElementById('eu-reports').value || null;
  const pw    = document.getElementById('eu-pw').value.trim();

  const update = { full_name: name, email, department_id: dept, reports_to: rep };
  const { error } = await SB.from('users').update(update).eq('id', userId);
  if (error) return toast('Error: ' + error.message,'error');

  if (pw) {
    const { error: pe } = await SB.rpc('update_user_password', { p_user_id: userId, p_new_password: pw });
    if (pe) return toast('User updated but password reset failed.','error');
    // Force must_change_pw
    await SB.from('users').update({ must_change_pw: true }).eq('id', userId);
  }

  await auditLog('USER_UPDATED','users', userId, {});
  toast('User updated!','success');
  closeModal();
  await loadUsersTable();
}

  await loadUsersTable();
}

async function openPermissions(userId, userName) {
  const { data: existing } = await SB
    .from('user_permissions')
    .select('permission')
    .eq('user_id', userId);
  const existingSet = new Set((existing||[]).map(p=>p.permission));

  openModal(`Permissions: ${userName}`, `
    <div class="perm-grid">
      ${PERMISSIONS.map(p=>`
        <label class="perm-item">
          <input type="checkbox" id="perm-${p.key}" ${existingSet.has(p.key)?'checked':''}/>
          <span>${p.icon} ${p.label}</span>
        </label>`).join('')}
    </div>`,
    [{ label:'Save Permissions', action: () => savePermissions(userId), style:'btn-primary' }]
  );
}

async function savePermissions(userId) {
  const newPerms = PERMISSIONS.filter(p => document.getElementById('perm-'+p.key)?.checked).map(p=>p.key);

  // delete all existing
  await SB.from('user_permissions').delete().eq('user_id', userId);

  // insert new
  if (newPerms.length > 0) {
    await SB.from('user_permissions').insert(
      newPerms.map(p => ({ user_id: userId, permission: p, granted_by: SESSION.user.id }))
    );
  }

  await auditLog('PERMISSIONS_UPDATED','users', userId, { permissions: newPerms });
  toast('Permissions saved!','success');
  closeModal();
}

async function addChecklistItem(trainingId, trainingTitle) {
  const desc  = document.getElementById('new-ci-desc').value.trim();
  const photo = document.getElementById('new-ci-photo').checked;
  if (!desc) return toast('Enter item description.','error');

  const { data: existing } = await SB.from('checklist_items').select('sort_order').eq('training_id', trainingId).order('sort_order',{ascending:false}).limit(1);
  const nextOrder = existing && existing.length > 0 ? existing[0].sort_order + 1 : 0;

  await SB.from('checklist_items').insert({ training_id: trainingId, description: desc, requires_photo: photo, sort_order: nextOrder });
  toast('Item added!','success');
  closeModal();
  openChecklist_manage(trainingId, trainingTitle);
}

async function saveChecklistItems(trainingId, items) {
  for (const item of items) {
    const desc  = document.getElementById(`cli-desc-${item.id}`)?.value?.trim();
    const photo = document.getElementById(`cli-photo-${item.id}`)?.checked;
    if (desc !== undefined) {
      await SB.from('checklist_items').update({ description: desc, requires_photo: !!photo }).eq('id', item.id);
    }
  }
  toast('Checklist saved!','success');
  closeModal();
}

  await SB.from('checklist_items').delete().eq('id', itemId);
  toast('Item removed.','success');
  closeModal();
  openChecklist_manage(trainingId, trainingTitle);
}

async function manageWorkflowTrainings(wfId, wfTitle) {
  const { data: all } = await SB.from('trainings').select('id, title').eq('is_active', true).order('title');
  const { data: current } = await SB.from('workflow_trainings').select('id, training_id, sort_order, trainings(title)').eq('workflow_id', wfId).order('sort_order');

  const currentIds = new Set((current||[]).map(c=>c.training_id));
  const available = (all||[]).filter(t => !currentIds.has(t.id));

  openModal(`Trainings in: ${wfTitle}`, `
    <p style="font-size:.82rem;color:var(--gray-600);margin-bottom:12px">Current trainings (in order):</p>
    <div id="wft-list">
      ${(current||[]).map((c,i)=>`
        <div class="wf-training-item">
          <span class="drag-handle">⠿</span>
          <span>${i+1}. ${c.trainings?.title||'?'}</span>
          <button class="remove-btn" onclick="removeWorkflowTraining('${c.id}','${wfId}','${escHtml(wfTitle)}')">✕</button>
        </div>`).join('')}
      ${current?.length===0?'<p style="color:var(--gray-400);font-size:.85rem">No trainings added yet.</p>':''}
    </div>
    <hr class="divider"/>
    <div class="form-group"><label>Add Training</label>
      <select class="form-control" id="wft-select">
        <option value="">— Select a training —</option>
        ${available.map(t=>`<option value="${t.id}">${t.title}</option>`).join('')}
      </select>
    </div>`,
    [{ label:'Add Training', action: () => addWorkflowTraining(wfId, wfTitle), style:'btn-primary' }]
  );
}

  const { data: existing } = await SB.from('workflow_trainings').select('sort_order').eq('workflow_id', wfId).order('sort_order',{ascending:false}).limit(1);
  const nextOrder = existing && existing.length > 0 ? existing[0].sort_order + 1 : 0;

  await SB.from('workflow_trainings').insert({ workflow_id: wfId, training_id: trainingId, sort_order: nextOrder });
  toast('Training added!','success');
  closeModal();
  manageWorkflowTrainings(wfId, wfTitle);

    <div class="form-group"><label>Employee</label>
      <select class="form-control" id="as-user">
        <option value="">— Select Employee —</option>
        ${(users||[]).map(u=>`<option value="${u.id}">${u.full_name} (${u.employee_id})</option>`).join('')}
      </select></div>
    <div class="form-group"><label>Training</label>
      <select class="form-control" id="as-train">
        <option value="">— Select Training —</option>
        ${(trainings||[]).map(t=>`<option value="${t.id}">${t.title}</option>`).join('')}
      </select></div>
    <button class="btn btn-primary" onclick="doAssignSingle()">Assign Training</button>`;
}

async function doAssignSingle() {
  const userId = document.getElementById('as-user').value;
  const trainId = document.getElementById('as-train').value;
  if (!userId || !trainId) return toast('Select both employee and training.','error');

  // check for duplicate active assignment
  const { data: dup } = await SB.from('training_assignments')
    .select('id')
    .eq('assigned_to', userId)
    .eq('training_id', trainId)
    .in('status', ['pending','in_progress','submitted'])
    .maybeSingle();

  if (dup) return toast('This employee already has an active assignment for this training.','error');

  const { error } = await SB.from('training_assignments').insert({
    training_id: trainId,
    assigned_to: userId,
    assigned_by: SESSION.user.id,
    status: 'pending'
  });
  if (error) return toast('Error: ' + error.message,'error');
  await auditLog('TRAINING_ASSIGNED','training_assignments', null, { assigned_to: userId, training_id: trainId });
  toast('Training assigned!','success');
}

async function renderAssignWorkflow() {
  const [{ data: users }, { data: workflows }] = await Promise.all([
    SB.from('users').select('id, full_name, employee_id').eq('is_active', true).order('full_name'),
    SB.from('workflows').select('id, title').eq('is_active', true).order('title'),
  ]);

  document.getElementById('assign-wf-body').innerHTML = `
    <div class="form-group"><label>Employee</label>
      <select class="form-control" id="aw-user">
        <option value="">— Select Employee —</option>
        ${(users||[]).map(u=>`<option value="${u.id}">${u.full_name} (${u.employee_id})</option>`).join('')}
      </select></div>
    <div class="form-group"><label>Workflow</label>
      <select class="form-control" id="aw-wf">
        <option value="">— Select Workflow —</option>
        ${(workflows||[]).map(w=>`<option value="${w.id}">${w.title}</option>`).join('')}
      </select></div>
    <button class="btn btn-primary" onclick="doAssignWorkflow()">Assign Workflow</button>`;
}

async function doAssignWorkflow() {
  const userId = document.getElementById('aw-user').value;
  const wfId   = document.getElementById('aw-wf').value;
  if (!userId || !wfId) return toast('Select both employee and workflow.','error');

  // Create workflow assignment
  const { data: wa, error: wae } = await SB.from('workflow_assignments').insert({
    workflow_id: wfId, assigned_to: userId, assigned_by: SESSION.user.id, status: 'pending'
  }).select().single();
  if (wae) return toast('Error: ' + wae.message,'error');

  // Get trainings in workflow
  const { data: wts } = await SB.from('workflow_trainings').select('training_id, sort_order').eq('workflow_id', wfId).order('sort_order');
  if (!wts || wts.length === 0) return toast('Workflow has no trainings. Please add trainings first.','error');

  // Create training assignments linked to this workflow assignment
  const inserts = wts.map(wt => ({
    training_id: wt.training_id,
    assigned_to: userId,
    assigned_by: SESSION.user.id,
    workflow_assignment_id: wa.id,
    status: 'pending'
  }));

  const { error: tae } = await SB.from('training_assignments').insert(inserts);
  if (tae) { await SB.from('workflow_assignments').delete().eq('id', wa.id); return toast('Error creating assignments.','error'); }

  await auditLog('WORKFLOW_ASSIGNED','workflow_assignments', wa.id, { assigned_to: userId, workflow_id: wfId });
  toast('Workflow assigned!','success');
}

/* ═══════════════════════════════════════════════════════════
   REPORTS
═══════════════════════════════════════════════════════════ */
async function pageReports() {
  const mc = document.getElementById('main-content');
  mc.innerHTML = `
    <div class="page-header"><h1>Reports & Audit Trail</h1></div>
    <div class="tabs">
      <div class="tab active" onclick="switchReportTab('assignments',this)">Training Records</div>
      <div class="tab" onclick="switchReportTab('audit',this)">Audit Log</div>
    </div>
    <div id="report-content">Loading…</div>`;
  await loadAssignmentsReport();
}

function switchReportTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'assignments') loadAssignmentsReport();
  else loadAuditLog();
}

async function loadAssignmentsReport() {
  const { data } = await SB
    .from('v_training_assignment_summary')
    .select('*')
    .order('assigned_at', {ascending:false})
    .limit(100);

  document.getElementById('report-content').innerHTML = `
    <div class="card"><div class="card-body table-wrap">
      <table>
        <thead><tr><th>Employee</th><th>Training</th><th>Dept</th><th>Status</th><th>Assigned</th><th>Approved By</th><th>Approved</th></tr></thead>
        <tbody>
          ${!data || data.length === 0
            ? '<tr><td colspan="7" style="text-align:center;color:var(--gray-400)">No records.</td></tr>'
            : data.map(r=>`<tr>
                <td>${r.assigned_to_name}<br><small class="chip">${r.assigned_to_emp_id}</small></td>
                <td>${r.training_title}</td>
                <td>${r.department_name||'—'}</td>
                <td>${STATUS_BADGE[r.status]||r.status}</td>
                <td>${fmtDate(r.assigned_at)}</td>
                <td>${r.approved_by_name||'—'}</td>
                <td>${r.approved_at?fmtDate(r.approved_at):'—'}</td>
              </tr>`).join('')}
        </tbody>
      </table>
    </div></div>`;
}

async function loadAuditLog() {
  const { data } = await SB
    .from('audit_log')
    .select('*, users(full_name, employee_id)')
    .order('created_at', {ascending:false})
    .limit(200);

  document.getElementById('report-content').innerHTML = `
    <div class="card"><div class="card-body table-wrap">
      <table>
        <thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Entity</th><th>Detail</th></tr></thead>
        <tbody>
          ${!data || data.length === 0
            ? '<tr><td colspan="5" style="text-align:center;color:var(--gray-400)">No log entries.</td></tr>'
            : data.map(r=>`<tr>
                <td style="white-space:nowrap">${fmtDateTime(r.created_at)}</td>
                <td>${r.users?.full_name||'System'}</td>
                <td><code style="font-size:.75rem">${r.action}</code></td>
                <td style="font-size:.75rem">${r.entity_type||'—'}</td>
                <td style="font-size:.75rem;max-width:180px;overflow:hidden;text-overflow:ellipsis">${r.detail?JSON.stringify(r.detail).slice(0,80):'—'}</td>
              </tr>`).join('')}
        </tbody>
      </table>
    </div></div>`;
}

/* ═══════════════════════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════════════════════ */
function pageSettings() {
  const mc = document.getElementById('main-content');
  mc.innerHTML = `
    <div class="page-header"><h1>Settings</h1></div>
    <div class="card" style="max-width:480px">
      <div class="card-header"><h2>Supabase Connection</h2></div>
      <div class="card-body">
        <div class="form-group"><label>Supabase URL</label>
          <input class="form-control" id="cfg-url" value="${localStorage.getItem('sb_url')||''}"/></div>
        <div class="form-group"><label>Anon Key</label>
          <input class="form-control" id="cfg-key" value="${localStorage.getItem('sb_key')||''}"/></div>
        <button class="btn btn-primary" onclick="saveConfig()">Save Connection</button>
      </div>
    </div>
    <div class="card" style="max-width:480px;margin-top:16px">
      <div class="card-header"><h2>Change My Password</h2></div>
      <div class="card-body">
        <div class="form-group"><label>New Password</label>
          <input class="form-control" type="password" id="cfg-pw1"/></div>
        <div class="form-group"><label>Confirm</label>
          <input class="form-control" type="password" id="cfg-pw2"/></div>
        <button class="btn btn-primary" onclick="changeSelfPassword()">Update Password</button>
      </div>
    </div>`;
}

function saveConfig() {
  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  SB = supabase.createClient(url, key);
  toast('Connection updated. Please sign in again.','info');
  logout();
}

async function changeSelfPassword() {
  const p1 = document.getElementById('cfg-pw1').value;
  const p2 = document.getElementById('cfg-pw2').value;
  if (p1.length < 8) return toast('Minimum 8 characters.','error');
  if (p1 !== p2) return toast('Passwords do not match.','error');
  const { error } = await SB.rpc('update_user_password', { p_user_id: SESSION.user.id, p_new_password: p1 });
  if (error) return toast('Error: ' + error.message,'error');
  toast('Password updated!','success');
  document.getElementById('cfg-pw1').value = '';
  document.getElementById('cfg-pw2').value = '';
}

/* ═══════════════════════════════════════════════════════════
   MODAL HELPERS
═══════════════════════════════════════════════════════════ */
function openModal(title, bodyHtml, buttons = []) {
  document.getElementById('gm-title').textContent = title;
  document.getElementById('gm-body').innerHTML = bodyHtml;
  const footer = document.getElementById('gm-footer');
  footer.innerHTML = '';
  if (buttons.length > 0) {
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = `btn ${b.style||'btn-outline'}`;
      btn.textContent = b.label;
      btn.onclick = b.action;
      footer.appendChild(btn);
    });
  }
  document.getElementById('generic-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('generic-modal').classList.remove('open');
}

// Close modal on overlay click
document.getElementById('generic-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

/* ═══════════════════════════════════════════════════════════
   AUDIT LOG HELPER
═══════════════════════════════════════════════════════════ */
async function auditLog(action, entityType, entityId, detail) {
  try {
    await SB.from('audit_log').insert({
      actor_id: SESSION?.user?.id || null,
      action,
      entity_type: entityType,
      entity_id: entityId || null,
      detail,
    });
  } catch(e) { /* non-critical */ }
}

/* ═══════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════ */
function toast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
}

function filterTable(input, tbodyId) {
  const q = input.value.toLowerCase();
  const tb = document.getElementById(tbodyId);
  if (!tb) return;
  Array.from(tb.rows).forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.querySelector('.theme-btn').textContent = next === 'dark' ? '☀️' : '🌙';
}
</script>
