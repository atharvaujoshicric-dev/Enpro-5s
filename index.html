<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enpro — Training Management</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" crossorigin="anonymous"></script>
<style>
/* ── DESIGN TOKENS ──────────────────────────────────────── */
:root {
  --red:       #C8102E;
  --red-dark:  #a00d24;
  --red-light: #fde8ec;
  --black:     #111111;
  --white:     #ffffff;

  --bg:        #f5f5f5;
  --surface:   #ffffff;
  --surface2:  #f0f0f0;
  --border:    #e0e0e0;
  --text:      #111111;
  --text-muted:#666666;
  --shadow:    0 2px 12px rgba(0,0,0,.08);
  --radius:    10px;
  --sidebar-w: 240px;
  --header-h:  56px;
}
[data-theme="dark"] {
  --bg:        #121212;
  --surface:   #1e1e1e;
  --surface2:  #2a2a2a;
  --border:    #333333;
  --text:      #f0f0f0;
  --text-muted:#999999;
  --shadow:    0 2px 12px rgba(0,0,0,.4);
}

/* ── RESET ──────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
img{max-width:100%}

/* ── LAYOUT ─────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;min-height:100vh}
#header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--red);color:#fff;display:flex;align-items:center;padding:0 16px;gap:12px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#header .logo{font-weight:700;font-size:1.1rem;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
#header .logo span{background:#fff;color:var(--red);border-radius:4px;padding:1px 6px;font-size:.75rem;font-weight:800;letter-spacing:1px}
#header .spacer{flex:1}
#header .user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px 4px 6px;font-size:.85rem}
#header .user-chip .avatar{width:28px;height:28px;border-radius:50%;background:#fff;color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem}
#theme-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:background .2s}
#theme-btn:hover{background:rgba(255,255,255,.3)}
#menu-btn{background:none;border:none;color:#fff;font-size:1.2rem;display:none}

#body{display:flex;flex:1;padding-top:var(--header-h)}
#sidebar{width:var(--sidebar-w);min-height:calc(100vh - var(--header-h));background:var(--surface);border-right:1px solid var(--border);position:fixed;top:var(--header-h);left:0;bottom:0;overflow-y:auto;transition:transform .3s;z-index:100}
#sidebar.hidden{transform:translateX(-100%)}
.nav-section{padding:12px 0 4px}
.nav-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:0 16px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:.875rem;color:var(--text);transition:background .15s,color .15s;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2)}
.nav-item.active{background:var(--red-light);color:var(--red);font-weight:600}
[data-theme="dark"] .nav-item.active{background:rgba(200,16,46,.15)}
.nav-item i{width:18px;text-align:center;font-size:.9rem}

#main{margin-left:var(--sidebar-w);flex:1;padding:24px;max-width:100%;min-height:calc(100vh - var(--header-h));transition:margin-left .3s}
#main.full{margin-left:0}

/* ── PAGE HEADER ────────────────────────────────────────── */
.page-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.page-title{font-size:1.4rem;font-weight:700}
.page-header .spacer{flex:1}
.badge{display:inline-block;background:var(--red-light);color:var(--red);border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:600}
[data-theme="dark"] .badge{background:rgba(200,16,46,.2)}

/* ── CARDS ──────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-body{padding:20px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-header h3{font-size:1rem;font-weight:600}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow)}
.stat-card .stat-val{font-size:2rem;font-weight:800;color:var(--red)}
.stat-card .stat-label{font-size:.8rem;color:var(--text-muted)}

/* ── TABLES ─────────────────────────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.875rem}
thead tr{background:var(--surface2)}
th{text-align:left;padding:10px 14px;font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);white-space:nowrap}
td{padding:12px 14px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--surface2)}

/* ── BUTTONS ────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;border:none;font-size:.875rem;font-weight:500;transition:background .15s,opacity .15s;cursor:pointer}
.btn-sm{padding:5px 11px;font-size:.8rem}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-dark)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-success{background:#16a34a;color:#fff}
.btn-success:hover{background:#15803d}
.btn-icon{background:none;border:none;padding:6px;border-radius:6px;color:var(--text-muted);transition:background .15s,color .15s}
.btn-icon:hover{background:var(--surface2);color:var(--text)}

/* ── FORMS ──────────────────────────────────────────────── */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--text)}
.form-control{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:.875rem;transition:border-color .15s,box-shadow .15s}
.form-control:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.1)}
.form-control::placeholder{color:var(--text-muted)}
textarea.form-control{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-hint{font-size:.75rem;color:var(--text-muted);margin-top:4px}
.form-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem}
.form-check input[type="checkbox"]{width:16px;height:16px;cursor:pointer;accent-color:var(--red)}

/* ── MODAL ──────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);transform:translateY(20px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-lg{max-width:760px}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1rem;font-weight:600}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* ── STATUS PILLS ───────────────────────────────────────── */
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.pill-pending{background:#fef3c7;color:#92400e}
.pill-progress{background:#dbeafe;color:#1e40af}
.pill-submitted{background:#e0e7ff;color:#3730a3}
.pill-approved{background:#dcfce7;color:#166534}
.pill-rejected{background:#fee2e2;color:#991b1b}
[data-theme="dark"] .pill-pending{background:#451a03;color:#fbbf24}
[data-theme="dark"] .pill-progress{background:#1e3a5f;color:#93c5fd}
[data-theme="dark"] .pill-submitted{background:#2e1065;color:#a5b4fc}
[data-theme="dark"] .pill-approved{background:#14532d;color:#86efac}
[data-theme="dark"] .pill-rejected{background:#450a0a;color:#fca5a5}

/* ── CHECKLIST ──────────────────────────────────────────── */
.checklist-item{display:flex;align-items:flex-start;gap:12px;padding:14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:var(--surface)}
.checklist-item.done{opacity:.7;background:var(--surface2)}
.checklist-item .ci-check{margin-top:2px;width:18px;height:18px;accent-color:var(--red);cursor:pointer;flex-shrink:0}
.checklist-item .ci-body{flex:1}
.checklist-item .ci-title{font-weight:600;font-size:.9rem}
.checklist-item .ci-desc{font-size:.8rem;color:var(--text-muted);margin-top:2px}
.checklist-item .ci-photo{margin-top:8px}
.photo-preview{max-width:140px;border-radius:6px;border:1px solid var(--border);margin-top:6px}

/* ── SORTABLE ITEMS ─────────────────────────────────────── */
.sortable-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--surface);cursor:grab}
.sortable-item:active{cursor:grabbing}
.sortable-item .drag-handle{color:var(--text-muted);font-size:1rem}
.sortable-item .item-label{flex:1;font-size:.875rem}

/* ── BREADCRUMB ─────────────────────────────────────────── */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--text-muted);margin-bottom:16px}
.breadcrumb span{color:var(--text-muted)}
.breadcrumb a{color:var(--red);cursor:pointer}
.breadcrumb a:hover{text-decoration:underline}

/* ── ALERT ──────────────────────────────────────────────── */
.alert{padding:12px 16px;border-radius:8px;font-size:.875rem;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.alert-info{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.alert-success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.alert-warn{background:#fef9c3;color:#854d0e;border:1px solid #fef08a}
.alert-danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
[data-theme="dark"] .alert-info{background:#1e3a5f;color:#93c5fd;border-color:#2563eb}
[data-theme="dark"] .alert-success{background:#14532d;color:#86efac;border-color:#16a34a}
[data-theme="dark"] .alert-danger{background:#450a0a;color:#fca5a5;border-color:#dc2626}

/* ── TOAST ──────────────────────────────────────────────── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;box-shadow:0 4px 20px rgba(0,0,0,.15);font-size:.875rem;display:flex;align-items:center;gap:10px;min-width:240px;animation:slideIn .2s ease}
.toast.success{border-left:4px solid #16a34a}
.toast.error{border-left:4px solid #dc2626}
.toast.info{border-left:4px solid var(--red)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── SETUP SCREEN ───────────────────────────────────────── */
#setup-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
.setup-card{background:var(--surface);border-radius:16px;padding:40px;max-width:460px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.setup-logo{text-align:center;margin-bottom:28px}
.setup-logo .logo-mark{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;background:var(--red);border-radius:16px;font-size:1.8rem;color:#fff;font-weight:800;margin-bottom:12px}
.setup-logo h2{font-size:1.3rem;font-weight:700}
.setup-logo p{font-size:.85rem;color:var(--text-muted);margin-top:4px}

/* ── LOGIN SCREEN ───────────────────────────────────────── */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9998;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--surface);border-radius:16px;padding:40px;max-width:420px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.15)}

/* ── PERMISSION GRID ────────────────────────────────────── */
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.perm-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:.825rem;cursor:pointer;transition:background .15s}
.perm-item:hover{background:var(--surface2)}
.perm-item input{accent-color:var(--red)}

/* ── PROGRESS BAR ───────────────────────────────────────── */
.progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:var(--red);border-radius:3px;transition:width .3s}

/* ── EMPTY STATE ────────────────────────────────────────── */
.empty{text-align:center;padding:48px 24px;color:var(--text-muted)}
.empty i{font-size:2.5rem;margin-bottom:12px;opacity:.4}
.empty p{font-size:.9rem}

/* ── TABS ───────────────────────────────────────────────── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab-btn{padding:10px 20px;border:none;background:none;color:var(--text-muted);font-size:.875rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red);font-weight:600}

/* ── SEARCH ─────────────────────────────────────────────── */
.search-bar{position:relative;max-width:320px}
.search-bar input{padding-left:36px}
.search-bar i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem}

/* ── RESPONSIVE ─────────────────────────────────────────── */
@media(max-width:768px){
  #menu-btn{display:flex;align-items:center;justify-content:center}
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .form-row{grid-template-columns:1fr}
  .perm-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  #header .user-chip .name{display:none}
  .stats-grid{grid-template-columns:1fr 1fr}
  .modal{max-width:100%;max-height:100%;border-radius:16px 16px 0 0;position:fixed;bottom:0;left:0;right:0}
  .modal-overlay{align-items:flex-end}
}

/* ── UTILITY ────────────────────────────────────────────── */
.d-none{display:none!important}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.text-muted{color:var(--text-muted)}
.text-red{color:var(--red)}
.text-sm{font-size:.825rem}
.fw-600{font-weight:600}
.flex{display:flex}.items-center{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}
.justify-between{justify-content:space-between}
.w-full{width:100%}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
</style>
</head>
<body>

<div id="setup-screen" class="d-none">
  <div class="setup-card">
    <div class="setup-logo">
      <div class="logo-mark">E</div>
      <h2>Enpro Training Management</h2>
      <p>System configuration dashboard</p>
    </div>
    <div class="form-group">
      <label class="form-label">Supabase Project URL</label>
      <input id="setup-url" class="form-control" placeholder="https://xxxx.supabase.co" type="url"/>
    </div>
    <div class="form-group">
      <label class="form-label">Anon / Service Key</label>
      <input id="setup-key" class="form-control" placeholder="eyJhbGciOiJIUzI1NiIs..." type="password"/>
    </div>
    <button class="btn btn-primary w-full mt-16" id="setup-btn" onclick="runSetup()"><i class="fa fa-bolt"></i> Link Database & Proceed</button>
    <div id="setup-msg" class="mt-12"></div>
  </div>
</div>

<div id="login-screen" class="d-none">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;background:var(--red);border-radius:14px;font-size:1.5rem;color:#fff;font-weight:800;margin-bottom:12px">E</div>
      <h2 style="font-size:1.2rem;font-weight:700">Enpro Training Management</h2>
      <p style="font-size:.85rem;color:var(--text-muted);margin-top:4px">Sign in to continue</p>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="login-email" class="form-control" placeholder="your@email.com" type="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="login-password" class="form-control" placeholder="••••••••" type="password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary w-full mt-16" onclick="doLogin()"><i class="fa fa-sign-in-alt"></i> Sign In</button>
    <div id="login-msg" class="mt-12"></div>
    <div style="text-align:center;margin-top:20px">
      <button onclick="showThemeToggleLogin()" id="theme-btn-login" style="background:none;border:none;color:var(--text-muted);font-size:.8rem;cursor:pointer"><i class="fa fa-moon"></i> Toggle dark mode</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="change-pass-modal">
  <div class="modal">
    <div class="modal-header"><h3><i class="fa fa-lock text-red"></i>&nbsp; Set New Password</h3></div>
    <div class="modal-body">
      <div class="alert alert-warn"><i class="fa fa-exclamation-triangle"></i> Password reset required on first standard login.</div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input id="cp-new" class="form-control" type="password" placeholder="Min 8 characters"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input id="cp-confirm" class="form-control" type="password"/>
      </div>
      <div id="cp-msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="doChangePassword()"><i class="fa fa-check"></i> Set Password</button>
    </div>
  </div>
</div>

<div id="app" class="d-none">
  <header id="header">
    <button id="menu-btn" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
    <div class="logo"><span>ENPRO</span> Training</div>
    <div class="spacer"></div>
    <button id="theme-btn" onclick="toggleTheme()" title="Toggle theme"><i class="fa fa-moon"></i></button>
    <div class="user-chip">
      <div class="avatar" id="header-avatar">U</div>
      <span class="name" id="header-name">User</span>
    </div>
    <button class="btn btn-icon" style="color:#fff;margin-left:4px" onclick="doLogout()" title="Sign out"><i class="fa fa-sign-out-alt"></i></button>
  </header>

  <div id="body">
    <nav id="sidebar">
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')"><i class="fa fa-home"></i> Dashboard</button>
        <button class="nav-item" data-page="my-trainings" onclick="navigate('my-trainings')"><i class="fa fa-tasks"></i> My Trainings</button>
      </div>
      <div class="nav-section" id="nav-manage" style="display:none">
        <div class="nav-label">Manage</div>
        <button class="nav-item" data-page="trainings" onclick="navigate('trainings')" id="nav-trainings"><i class="fa fa-book"></i> Trainings</button>
        <button class="nav-item" data-page="workflows" onclick="navigate('workflows')" id="nav-workflows"><i class="fa fa-project-diagram"></i> Workflows</button>
        <button class="nav-item" data-page="assignments" onclick="navigate('assignments')" id="nav-assignments"><i class="fa fa-clipboard-list"></i> Assignments</button>
      </div>
      <div class="nav-section" id="nav-admin" style="display:none">
        <div class="nav-label">Admin</div>
        <button class="nav-item" data-page="users" onclick="navigate('users')"><i class="fa fa-users"></i> Users</button>
        <button class="nav-item" data-page="departments" onclick="navigate('departments')"><i class="fa fa-building"></i> Departments</button>
        <button class="nav-item" data-page="reports" onclick="navigate('reports')"><i class="fa fa-chart-bar"></i> Reports</button>
        <button class="nav-item" data-page="settings" onclick="navigate('settings')"><i class="fa fa-cog"></i> Settings</button>
      </div>
    </nav>

    <main id="main">
      <div id="page-dashboard"></div>
      <div id="page-my-trainings" class="d-none"></div>
      <div id="page-trainings" class="d-none"></div>
      <div id="page-workflows" class="d-none"></div>
      <div id="page-assignments" class="d-none"></div>
      <div id="page-users" class="d-none"></div>
      <div id="page-departments" class="d-none"></div>
      <div id="page-reports" class="d-none"></div>
      <div id="page-settings" class="d-none"></div>
    </main>
  </div>
</div>

<div id="toast-container"></div>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-inner">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="btn-icon" onclick="closeModal()"><i class="fa fa-times"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ── GLOBALS ─────────────────────────────────────────────────
let SB_URL = '', SB_KEY = '';
let currentUser = null;
let currentUserPerm = null;
let currentPage = 'dashboard';

// ── SUPABASE REST ENGINE ────────────────────────────────────
async function sb(path, opts={}) {
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: { 
      'apikey': SB_KEY, 
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json', 
      'Prefer': opts.prefer || 'return=representation', 
      ...opts.headers 
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) { const e = await res.json().catch(() => ({ message: res.statusText })); throw new Error(e.message || res.statusText); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function audit(action, target_type, target_id, details={}) {
  try {
    await sb('audit_log', { method:'POST', body:{ actor_id: currentUser?.id, action, target_type, target_id, details } });
  } catch(e) {}
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type==='success'?'check-circle':type==='error'?'times-circle':'info-circle';
  el.innerHTML = `<i class="fa fa-${icon}"></i> ${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('enpro-theme', t);
  document.getElementById('theme-btn').innerHTML = t==='dark' ? '<i class="fa fa-sun"></i>' : '<i class="fa fa-moon"></i>';
}
function showThemeToggleLogin() { toggleTheme(); }
function applyTheme() {
  const t = localStorage.getItem('enpro-theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.innerHTML = t==='dark'?'<i class="fa fa-sun"></i>':'<i class="fa fa-moon"></i>';
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

function openModal(title, bodyHtml, footerHtml, large=false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-footer').innerHTML = footerHtml || '';
  document.getElementById('modal-inner').className = 'modal' + (large?' modal-lg':'');
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) closeModal(); });

// ── CONNECT TO DB SCREEN ───────────────────────────────────
function showSetup() { document.getElementById('setup-screen').classList.remove('d-none'); }

async function runSetup() {
  const url = document.getElementById('setup-url').value.trim().replace(/\/$/,'');
  const key = document.getElementById('setup-key').value.trim();
  const msg = document.getElementById('setup-msg');
  if (!url || !key) { msg.innerHTML='<div class="alert alert-danger">All connection fields required.</div>'; return; }
  
  SB_URL = url; SB_KEY = key;
  try {
    // Ping DB mapping schema connection test via checking app_users configuration
    await sb('app_users?limit=1');
    localStorage.setItem('enpro-url', url);
    localStorage.setItem('enpro-key', key);
    msg.innerHTML='<div class="alert alert-success"><i class="fa fa-check"></i> Connected successfully!</div>';
    setTimeout(() => { document.getElementById('setup-screen').classList.add('d-none'); showLogin(); }, 1000);
  } catch(e) {
    msg.innerHTML=`<div class="alert alert-danger">Connection verification failed: ${e.message}</div>`;
  }
}

// ── CUSTOM CRYPTO-LESS AUTH EMULATION FOR DEMO / PUBLIC ANON KEY FLOWS ──
function showLogin() { document.getElementById('login-screen').classList.remove('d-none'); }

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const msg = document.getElementById('login-msg');
  if (!email || !pass) { msg.innerHTML='<div class="alert alert-danger">Enter structural login criteria.</div>'; return; }
  msg.innerHTML='<div class="alert alert-info"><i class="fa fa-spinner fa-spin"></i> Authenticating data parameters…</div>';
  
  try {
    // Explicitly fetching schema and handle relational checks resolving 422 disambiguation
    const users = await sb(`app_users?email=eq.${encodeURIComponent(email)}&status=eq.active`);
    if (!users.length) throw new Error('Account not found, inactive, or needs configuration update.');
    
    currentUser = users[0];
    
    // Resolve PostgREST 422 explicitly handling naming constraints
    const perms = await sb(`user_permissions?user_id=eq.${currentUser.id}`);
    currentUserPerm = perms[0] || {};
    
    document.getElementById('login-screen').classList.add('d-none');
    
    await audit('login', 'app_users', currentUser.id);
    launchApp();
  } catch(e) {
    msg.innerHTML=`<div class="alert alert-danger"><i class="fa fa-times"></i> ${e.message}</div>`;
  }
}

function doLogout() {
  currentUser = null; currentUserPerm = null;
  document.getElementById('app').classList.add('d-none');
  document.getElementById('login-screen').classList.remove('d-none');
  document.getElementById('login-email').value='';
  document.getElementById('login-password').value='';
  document.getElementById('login-msg').innerHTML='';
}

function launchApp() {
  applyTheme();
  document.getElementById('app').classList.remove('d-none');
  document.getElementById('header-name').textContent = currentUser.name;
  document.getElementById('header-avatar').textContent = currentUser.name[0].toUpperCase();

  const p = currentUserPerm;
  // If user has any design operational administrative parameters, show dashboard navigation controls
  if (p.can_create_users || p.can_manage_departments || p.can_view_reports) {
    document.getElementById('nav-admin').style.display='';
  }
  if (p.can_create_trainings || p.can_create_workflows || p.can_assign_trainings) {
    document.getElementById('nav-manage').style.display='';
  }
  navigate('dashboard');
}

function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
  document.querySelectorAll('[id^="page-"]').forEach(el => el.classList.add('d-none'));
  document.getElementById(`page-${page}`).classList.remove('d-none');
  currentPage = page;
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
  pages[page]?.();
}

const pages = {
  dashboard: renderDashboard,
  'my-trainings': renderMyTrainings,
  trainings: renderTrainings,
  workflows: renderWorkflows,
  assignments: renderAssignments,
  users: renderUsers,
  departments: renderDepartments,
  reports: renderReports,
  settings: renderSettings
};

// ──────────────────────────────────────────────────────────────
// MODULE COMPONENT IMPLEMENTATIONS
// ──────────────────────────────────────────────────────────────
async function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  el.innerHTML = `<div class="page-header"><div class="page-title">System Dashboard</div></div><div class="stats-grid" id="dash-stats"></div><div id="dash-recent"></div>`;
  try {
    const [allAssign, myAssign, totalUsers, totalTrainings] = await Promise.all([
      sb('training_assignments'),
      sb(`training_assignments?assigned_to=eq.${currentUser.id}`),
      sb('app_users?status=eq.active'),
      sb('trainings')
    ]);
    
    let statsHtml = `
      <div class="stat-card"><div class="stat-val">${myAssign.length}</div><div class="stat-label">My Total Modules</div></div>
      <div class="stat-card"><div class="stat-val">${myAssign.filter(a=>a.status==='pending'||a.status==='submitted').length}</div><div class="stat-label">Pending Response</div></div>`;
    
    if (currentUserPerm.can_view_reports) {
      statsHtml += `
        <div class="stat-card"><div class="stat-val">${totalUsers.length}</div><div class="stat-label">Active Platform Users</div></div>
        <div class="stat-card"><div class="stat-val">${totalTrainings.length}</div><div class="stat-label">Courses Formulated</div></div>`;
    }
    document.getElementById('dash-stats').innerHTML = statsHtml;
  } catch(e) { el.innerHTML += `<div class="alert alert-danger">${e.message}</div>`; }
}

async function renderMyTrainings() {
  const el = document.getElementById('page-my-trainings');
  el.innerHTML = `<div class="page-header"><div class="page-title">My Learning Track</div></div><div id="mt-list"><div class="empty"><i class="fa fa-spinner fa-spin"></i><p>Accessing core systems…</p></div></div>`;
  try {
    const assignments = await sb(`training_assignments?assigned_to=eq.${currentUser.id}&order=created_at.desc`);
    if (!assignments.length) { document.getElementById('mt-list').innerHTML='<div class="empty"><i class="fa fa-tasks"></i><p>No coursework assigned to your identity profile.</p></div>'; return; }
    
    const trainingIds = [...new Set(assignments.map(a=>a.training_id))];
    const tList = await sb(`trainings?id=in.(${trainingIds.join(',')})`);
    const tMap = Object.fromEntries(tList.map(t=>[t.id,t]));
    
    let html = '<div style="display:grid;gap:12px">';
    for (const a of assignments) {
      const t = tMap[a.training_id] || {};
      html += `<div class="card card-body" onclick="openTrainingAssignment('${a.id}')" style="cursor:pointer">
        <div class="flex items-center justify-between">
          <div><div class="fw-600">${t.title || 'Unknown Template Module'}</div><div class="text-sm text-muted mt-8">${t.description || ''}</div></div>
          <div><span class="pill pill-${a.status}">${a.status}</span></div>
        </div>
      </div>`;
    }
    html += '</div>';
    document.getElementById('mt-list').innerHTML = html;
  } catch(e) { el.innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
}

async function openTrainingAssignment(assignId) {
  try {
    const [assign] = await sb(`training_assignments?id=eq.${assignId}`);
    const [training] = await sb(`trainings?id=eq.${assign.training_id}`);
    const items = await sb(`training_checklist_items?training_id=eq.${assign.training_id}&order=order_index.asc`);
    const completions = await sb(`assignment_checklist_responses?assignment_id=eq.${assignId}`);
    const compMap = Object.fromEntries(completions.map(c=>[c.checklist_item_id, c]));
    
    const editable = assign.assigned_to === currentUser.id && assign.status === 'pending';

    let itemsHtml = items.map(item => {
      const comp = compMap[item.id];
      const done = comp?.is_checked;
      return `<div class="checklist-item ${done?'done':''}">
        <input type="checkbox" class="ci-check" ${done?'checked':''} ${!editable?'disabled':''} onchange="toggleCheckItem('${assignId}','${item.id}',this.checked)"/>
        <div class="ci-body">
          <div class="ci-title">${item.description}</div>
        </div>
      </div>`;
    }).join('');

    let footerHtml = `<button class="btn btn-secondary" onclick="closeModal()">Close</button>`;
    if (editable) {
      footerHtml += `<button class="btn btn-primary" onclick="submitTrainingForApproval('${assignId}')"><i class="fa fa-paper-plane"></i> Finalize Checklist</button>`;
    }

    openModal(`${training.title}`, `<div id="checklist-items">${itemsHtml || 'No structural checklist parameters verified.'}</div>`, footerHtml, true);
  } catch(e) { toast(e.message, 'error'); }
}

async function toggleCheckItem(assignId, itemId, checked) {
  try {
    const existing = await sb(`assignment_checklist_responses?assignment_id=eq.${assignId}&checklist_item_id=eq.${itemId}`);
    if (existing.length) {
      await sb(`assignment_checklist_responses?id=eq.${existing[0].id}`, { method:'PATCH', body:{ is_checked: checked, updated_at: new Date().toISOString() }});
    } else {
      await sb('assignment_checklist_responses', { method:'POST', body:{ assignment_id: assignId, checklist_item_id: itemId, is_checked: checked }});
    }
  } catch(e) { toast(e.message, 'error'); }
}

async function submitTrainingForApproval(assignId) {
  try {
    await sb(`training_assignments?id=eq.${assignId}`, { method:'PATCH', body:{ status:'submitted', submitted_at: new Date().toISOString() }});
    toast('Coursework processing verified','success');
    closeModal();
    renderMyTrainings();
  } catch(e) { toast(e.message, 'error'); }
}

async function renderTrainings() {
  const el = document.getElementById('page-trainings');
  el.innerHTML = `<div class="page-header"><div class="page-title">Database Formulations</div><div class="spacer"></div><button class="btn btn-primary" onclick="openTrainingForm()"><i class="fa fa-plus"></i> Initialize Module</button></div><div id="trainings-list"></div>`;
  try {
    const trainings = await sb('trainings?order=created_at.desc');
    let rows = trainings.map(t=>`<tr>
      <td class="fw-600">${t.title}</td>
      <td class="text-sm text-muted">${t.description || '—'}</td>
      <td>${new Date(t.created_at).toLocaleDateString()}</td>
    </tr>`).join('');
    document.getElementById('trainings-list').innerHTML=`<div class="card"><div class="card-body table-wrap"><table><thead><tr><th>Title</th><th>Description</th><th>Formulated Timestamp</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  } catch(e) { el.innerHTML += `<div class="alert alert-danger">${e.message}</div>`; }
}

async function openTrainingForm() {
  openModal('Formulate Structural Course Parameters',
    `<div class="form-group"><label class="form-label">Course Title *</label><input id="tf-title" class="form-control" /></div>
     <div class="form-group"><label class="form-label">Core Description</label><textarea id="tf-desc" class="form-control"></textarea></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveTraining()"><i class="fa fa-save"></i> Commit Record</button>`
  );
}

async function saveTraining() {
  const title = document.getElementById('tf-title').value.trim();
  if (!title) { toast('Operational description configuration context required.','error'); return; }
  try {
    await sb('trainings', { method:'POST', body:{ title, description: document.getElementById('tf-desc').value, created_by: currentUser.id }});
    toast('Course matrix saved to data architecture','success'); closeModal(); renderTrainings();
  } catch(e) { toast(e.message,'error'); }
}

async function renderWorkflows() {
  const el = document.getElementById('page-workflows');
  el.innerHTML = `<div class="page-header"><div class="page-title">Operations Control Matrix (Workflows)</div></div><div id="workflows-list"></div>`;
  try {
    const workflows = await sb('workflows?order=created_at.desc');
    let rows = workflows.map(w=>`<tr><td class="fw-600">${w.title}</td><td><span class="pill pill-submitted">${w.type}</span></td></tr>`).join('');
    document.getElementById('workflows-list').innerHTML=`<div class="card"><div class="card-body table-wrap"><table><thead><tr><th>Workflow Context Key</th><th>Engine Architecture Execution Model</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  } catch(e) { el.innerHTML += `<div class="alert alert-danger">${e.message}</div>`; }
}

async function renderAssignments() {
  const el = document.getElementById('page-assignments');
  el.innerHTML=`<div class="page-header"><div class="page-title">System Assignments Master Control</div></div><div id="assign-list"></div>`;
  try {
    // Explicitly fetching schema and handling 422 relationships on relational entities
    const assigns = await sb('training_assignments?order=created_at.desc');
    let rows = assigns.map(a=>`<tr><td>${a.training_id}</td><td>${a.assigned_to}</td><td><span class="pill pill-${a.status}">${a.status}</span></td></tr>`).join('');
    document.getElementById('assign-list').innerHTML=`<div class="card"><div class="card-body table-wrap"><table><thead><tr><th>Module Tracking Blueprint Code</th><th>Target Network Identity</th><th>Status Matrix Value</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  } catch(e) { el.innerHTML += `<div class="alert alert-danger">${e.message}</div>`; }
}

async function renderUsers() {
  const el = document.getElementById('page-users');
  el.innerHTML=`<div class="page-header"><div class="page-title">Platform Accounts Directory</div></div><div id="users-list"></div>`;
  try {
    const users = await sb('app_users?order=created_at.asc');
    let rows = users.map(u=>`<tr><td class="fw-600">${u.name}</td><td>${u.email}</td><td><span class="pill pill-approved">${u.status}</span></td></tr>`).join('');
    document.getElementById('users-list').innerHTML=`<div class="card"><div class="card-body table-wrap"><table><thead><tr><th>Identity Context Name</th><th>Network Email Address</th><th>Operational Profile Status</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  } catch(e) { el.innerHTML += `<div class="alert alert-danger">${e.message}</div>`; }
}

async function renderDepartments() {
  const el = document.getElementById('page-departments');
  el.innerHTML=`<div class="page-header"><div class="page-title">Corporate Divisions Directory</div></div><div id="dept-list"></div>`;
  try {
    const depts = await sb('departments?order=name.asc');
    let rows = depts.map(d=>`<tr><td class="fw-600">${d.name}</td><td>${d.id}</td></tr>`).join('');
    document.getElementById('dept-list').innerHTML=`<div class="card"><div class="card-body table-wrap"><table><thead><tr><th>Operational Cluster Allocation Name</th><th>System Schema GUID Mapping Code</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  } catch(e) { el.innerHTML += `<div class="alert alert-danger">${e.message}</div>`; }
}

async function renderReports() {
  const el = document.getElementById('page-reports');
  el.innerHTML=`<div class="page-header"><div class="page-title">Operational Audits & Tracking Data Log</div></div><div id="reports-content"></div>`;
  try {
    const logs = await sb('audit_log?order=created_at.desc&limit=25');
    let rows = logs.map(l=>`<tr><td>${l.action}</td><td>${l.target_type || 'system'}</td><td>${new Date(l.created_at).toLocaleString()}</td></tr>`).join('');
    document.getElementById('reports-content').innerHTML=`<div class="card"><div class="card-body table-wrap"><table><thead><tr><th>Event Action Trigger</th><th>Entity Targeted Context</th><th>Timestamp Matrix Element</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  } catch(e) { el.innerHTML += `<div class="alert alert-danger">${e.message}</div>`; }
}

async function renderSettings() {
  const el = document.getElementById('page-settings');
  el.innerHTML=`<div class="page-header"><div class="page-title">Hardware Core Settings Context</div></div>
  <div class="card card-body" style="max-width:520px">
    <div class="form-group"><label class="form-label">Supabase Target Infrastructure URL</label><input class="form-control" value="${SB_URL}" readonly/></div>
    <button class="btn btn-danger btn-sm" onclick="resetSetup()"><i class="fa fa-undo"></i> Wreak Local Data Cache Settings</button>
  </div>`;
}

function resetSetup() {
  localStorage.clear();
  location.reload();
}

async function boot() {
  applyTheme();
  SB_URL = localStorage.getItem('enpro-url') || '';
  SB_KEY = localStorage.getItem('enpro-key') || '';
  if (!SB_URL || !SB_KEY) { showSetup(); return; }
  showLogin();
}

window.addEventListener('load', boot);
</script>
</body>
</html>
