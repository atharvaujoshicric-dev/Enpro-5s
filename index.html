<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>5S Management — Enpro Industries</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">5S·PRO</div>
    <div class="auth-sub">Enpro Industries — Zone Management System</div>
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com" autocomplete="username"></div>
    <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="auth-error" id="login-error"></div>
    <button class="btn btn-primary" id="login-btn">Sign In</button>
    <div class="demo-creds">
      <p>Demo Credentials</p>
      <table>
        <tr><td>Admin</td><td>admin@enpro.com</td><td>Admin@123</td></tr>
        <tr><td>CEO</td><td>ceo@enpro.com</td><td>Ceo@123</td></tr>
        <tr><td>Manager 1</td><td>manager1@enpro.com</td><td>Manager@123</td></tr>
        <tr><td>User 1</td><td>user1@enpro.com</td><td>User@123</td></tr>
      </table>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>5S·PRO</span></div>
    <div class="sidebar-user">
      <div class="uname" id="sidebar-uname">—</div>
      <span class="role-badge" id="sidebar-role">—</span>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline btn-sm" id="logout-btn" style="width:100%">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>
  <main class="main-content">
    <div class="page" id="page-dashboard"><div id="dash-content"></div></div>
    <div class="page" id="page-zones"><div id="zones-content"></div></div>
    <div class="page" id="page-records"><div id="records-content"></div></div>
    <div class="page" id="page-users"><div id="users-content"></div></div>
    <div class="page" id="page-settings"><div id="settings-content"></div></div>
    <div class="page" id="page-reports"><div id="reports-content"></div></div>
    <div class="page" id="page-pings"><div id="pings-content"></div></div>
  </main>
</div>

<!-- MODAL: Zone -->
<div class="modal-overlay" id="modal-add-zone">
  <div class="modal">
    <div class="modal-title" id="modal-zone-title">Add Zone</div>
    <input type="hidden" id="zone-modal-id">
    <div class="field"><label>Zone Name</label><input type="text" id="zone-modal-name" placeholder="e.g. Zone A"></div>
    <div class="field"><label>Description</label><input type="text" id="zone-modal-desc" placeholder="Brief description"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-add-zone')">Cancel</button>
      <button class="btn btn-primary" id="save-zone-btn">Save Zone</button>
    </div>
  </div>
</div>

<!-- MODAL: Record -->
<div class="modal-overlay" id="modal-add-record">
  <div class="modal">
    <div class="modal-title">New Work Record</div>
    <div class="field"><label>Title / Task</label><input type="text" id="rec-title" placeholder="e.g. Production Floor FPP"></div>
    <div class="field"><label>Zone</label><select id="rec-zone-sel"></select></div>
    <div class="field"><label>Work Type</label>
      <select id="rec-worktype">
        <option value="FPP">FPP — 90 Day (6 staged after photos)</option>
        <option value="WPP">WPP — 48 Hour (single before → after)</option>
        <option value="WFP">WFP — General (single before → after)</option>
      </select>
    </div>
    <div class="field"><label>Notes (optional)</label><textarea id="rec-notes" rows="2"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-add-record')">Cancel</button>
      <button class="btn btn-primary" id="save-record-btn">Create Record</button>
    </div>
  </div>
</div>

<!-- MODAL: User -->
<div class="modal-overlay" id="modal-add-user">
  <div class="modal">
    <div class="modal-title" id="modal-user-title">Add User</div>
    <input type="hidden" id="user-edit-email">
    <div class="field"><label>Full Name</label><input type="text" id="user-name"></div>
    <div class="field"><label>Email (Microsoft)</label><input type="email" id="user-email" placeholder="user@enpro.com"></div>
    <div class="field"><label>Password</label><input type="password" id="user-password" placeholder="Leave blank to keep existing"></div>
    <div class="field"><label>Role</label>
      <select id="user-role">
        <option value="user">User</option>
        <option value="zone_manager">Zone Manager</option>
        <option value="ceo">CEO</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="field"><label>Assigned Zone</label><select id="user-zone-sel"></select></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-add-user')">Cancel</button>
      <button class="btn btn-primary" id="save-user-btn">Save User</button>
    </div>
  </div>
</div>

<!-- MODAL: Reject -->
<div class="modal-overlay" id="modal-reject">
  <div class="modal">
    <div class="modal-title">Reject — Add Comment</div>
    <div style="font-size:.85rem;color:var(--accent);margin-bottom:14px;font-weight:500" id="reject-stage-label"></div>
    <div class="field"><label>Rejection Reason</label>
      <textarea id="reject-comment" rows="4" placeholder="Explain what needs to be corrected..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-reject')">Cancel</button>
      <button class="btn btn-danger" id="confirm-reject-btn">Confirm Rejection</button>
    </div>
  </div>
</div>

<!-- MODAL: Ping -->
<div class="modal-overlay" id="modal-add-ping">
  <div class="modal">
    <div class="modal-title">Send Ping / Reminder</div>
    <div class="field"><label>To (Label)</label><input type="text" id="ping-to" placeholder="e.g. Zone A Manager"></div>
    <div class="field"><label>Send to Role</label>
      <select id="ping-torole">
        <option value="zone_manager">Zone Manager</option>
        <option value="user">User</option>
        <option value="ceo">CEO</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="field"><label>Message</label><textarea id="ping-message" rows="3"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-add-ping')">Cancel</button>
      <button class="btn btn-primary" id="save-ping-btn">Send Ping</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox"><img id="lb-img" src="" alt="Photo"></div>
<!-- Toast -->
<div id="toast"></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
